# User-configurable variables
# Place the Blackmagic installer .run file here (license requires you download it yourself):
#   ./files/DaVinci_Resolve_Studio_20.3.2_Linux.run
#
# Then run:
#   ./bootstrap.sh
#   ansible-playbook -K site.yml

resolve_installer_run: "{{ playbook_dir }}/files/DaVinci_Resolve_Studio_20.3.2_Linux.run"

# macOS Resolve Studio installer (DMG in ./files)
resolve_macos_app_path: "/Applications/DaVinci Resolve Studio.app"
resolve_macos_dmg_path: ""
resolve_macos_dmg_pattern: "DaVinci_Resolve_Studio*.dmg"
resolve_macos_pkg_pattern: "DaVinci Resolve Studio*.pkg"
resolve_macos_mountpoint: "/Volumes/ResolveStudio"

# MakeResolveDeb (turns the .run into a proper .deb for Ubuntu/Mint)
makeresolvedeb_version: "1.8.3"
makeresolvedeb_url: "https://www.danieltufvesson.com/download/?file=makeresolvedeb%2Fmakeresolvedeb_{{ makeresolvedeb_version }}_multi.sh.tar.gz"

# Ubuntu pool libssl1.1 (Mint 22 / Ubuntu 24.04 often needs this for Resolve)
libssl11_url: "https://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb"

# Optional: Resolve 20 "Extras download" CA bundle path symlink fix
resolve_extras_ca_symlink: true

# k3s + LocalAI defaults
enable_k3s: true
enable_localai: true
enable_wisemapping: true

localai_namespace: localai
localai_image: "localai/localai:latest"
localai_port: 8080

localai_use_vulkan: true
localai_models_host_path: "/opt/localai/models"
localai_models_container_path: "/models"
localai_models_path_env: "/models"

localai_service_type: ClusterIP
localai_nodeport: 30880

localai_cpu_request: "4"
localai_mem_request: "16Gi"
localai_cpu_limit: "16"
localai_mem_limit: "64Gi"

# k3s + Wisemapping defaults
wisemapping_namespace: wisemapping
wisemapping_manifest_dir: "/opt/wisemapping"
wisemapping_image: "wisemapping/wisemapping:latest"

wisemapping_pvc_name: "wisemapping-db"
wisemapping_storage_class: "local-path"
wisemapping_storage_size: "5Gi"

wisemapping_container_port: 80
wisemapping_service_port: 80
wisemapping_service_type: NodePort
wisemapping_nodeport: 30080

wisemapping_datasource_url: "jdbc:hsqldb:file:/var/lib/wisemapping/db/wisemapping;sql.names=false;sql.regular_names=false;shutdown=true"
wisemapping_datasource_driver: "org.hsqldb.jdbc.JDBCDriver"
wisemapping_datasource_username: "sa"
wisemapping_datasource_password: ""
wisemapping_jpa_ddl_auto: "update"
