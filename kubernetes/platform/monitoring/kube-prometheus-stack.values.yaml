grafana:
  enabled: true
  defaultDashboardsEnabled: true
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    accessModes:
    - ReadWriteOnce
    size: 10Gi
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/service.serversscheme: http
    hosts:
    - grafana.thekeepstudios.com
    path: /
    pathType: Prefix
  additionalDataSources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true

prometheus:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/service.serversscheme: http
    hosts:
    - prometheus.thekeepstudios.com
    paths:
    - /
    pathType: Prefix
  prometheusSpec:
    retention: 15d
    retentionSize: 20GB
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 25Gi

alertmanager:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/service.serversscheme: http
    hosts:
    - alerts.thekeepstudios.com
    paths:
    - /
    pathType: Prefix
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi

# k3s does not expose all control-plane components in the same way as full kubeadm.
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
