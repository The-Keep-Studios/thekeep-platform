grafana:
  enabled: true
  defaultDashboardsEnabled: true
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    accessModes:
    - ReadWriteOnce
    size: 10Gi
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/service.serversscheme: http
    hosts:
    - grafana.thekeepstudios.com
    path: /
    pathType: Prefix
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: monitoring
  additionalDataSources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki.monitoring.svc.cluster.local:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000

prometheus:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: monitoring-monitoring-basic-auth@kubernetescrd
      traefik.ingress.kubernetes.io/service.serversscheme: http
    hosts:
    - prometheus.thekeepstudios.com
    paths:
    - /
    pathType: Prefix
  prometheusSpec:
    retention: 15d
    retentionSize: 20GB
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 25Gi

additionalPrometheusRulesMap:
  backup-rules:
    groups:
      - name: backup.rules
        rules:
          - alert: LeantimeBackupFailed
            expr: kube_job_status_failed{job_name=~"leantime-db-backup-.*"} > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Leantime database backup failed"
              description: "The Leantime database backup job {{ $labels.job_name }} has failed."
  platform-visibility-rules:
    groups:
      - name: platform.visibility.rules
        rules:
          - alert: WiseMappingBackendUnavailable
            expr: kube_deployment_status_replicas_available{namespace="wisemapping", deployment="wisemapping"} < kube_deployment_spec_replicas{namespace="wisemapping", deployment="wisemapping"}
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "WiseMapping backend is unavailable"
              description: "The WiseMapping deployment has fewer available replicas than desired. The nginx frontend may still answer / while the Java API is down."
          - alert: GrafanaUnavailable
            expr: kube_deployment_status_replicas_available{namespace="monitoring", deployment="kube-prometheus-stack-grafana"} < kube_deployment_spec_replicas{namespace="monitoring", deployment="kube-prometheus-stack-grafana"}
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Grafana is unavailable"
              description: "The Grafana deployment has fewer available replicas than desired."
          - alert: LokiUnavailable
            expr: kube_statefulset_status_replicas_ready{namespace="monitoring", statefulset="loki"} < kube_statefulset_replicas{namespace="monitoring", statefulset="loki"}
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Loki is unavailable"
              description: "The Loki StatefulSet has fewer ready replicas than desired."
          - alert: PromtailUnavailable
            expr: kube_daemonset_status_number_available{namespace="monitoring", daemonset="loki-promtail"} < kube_daemonset_status_desired_number_scheduled{namespace="monitoring", daemonset="loki-promtail"}
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Promtail is unavailable"
              description: "Promtail is not running on every scheduled node, so pod logs may be missing from Loki."

alertmanager:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: monitoring-monitoring-basic-auth@kubernetescrd
      traefik.ingress.kubernetes.io/service.serversscheme: http
    hosts:
    - alerts.thekeepstudios.com
    paths:
    - /
    pathType: Prefix
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi

# k3s does not expose all control-plane components in the same way as full kubeadm.
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
