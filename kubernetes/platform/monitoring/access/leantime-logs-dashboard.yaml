              "uid": "loki"
            },
            "definition": "label_values(namespace)",
            "hide": 0,
            "includeAll": false,
            "label": "Namespace",
            "multi": false,
            "name": "namespace",
            "options": [],
            "query": "label_values(namespace)",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {
              "selected": false,
              "text": "leantime",
              "value": "leantime"
            },
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "definition": "label_values({namespace=\"$namespace\"}, app)",
            "hide": 0,
            "includeAll": false,
            "label": "App",
            "multi": false,
            "name": "app",
            "options": [],
            "query": "label_values({namespace=\"$namespace\"}, app)",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {
              "selected": false,
              "text": "leantime",
              "value": "leantime"
            },
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "definition": "label_values({namespace=\"$namespace\", app=\"$app\"}, container)",
            "hide": 0,
            "includeAll": false,
            "label": "Container",
            "multi": false,
            "name": "container",
            "options": [],
            "query": "label_values({namespace=\"$namespace\", app=\"$app\"}, container)",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {
              "selected": false,
              "text": ".*",
              "value": ".*"
            },
            "hide": 0,
            "label": "Search Regex",
            "name": "search",
            "options": [],
            "query": ".*",
            "skipUrlSync": false,
            "type": "textbox"
          }
        ]
      },
      "time": {
        "from": "now-2h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Leantime Logs",
      "uid": "leantime-logs",
      "version": 1,
      "weekStart": ""
    }
