apiVersion: v1
kind: ConfigMap
metadata:
  name: leantime-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  leantime-logs.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "target": {
              "limit": 100,
              "matchAny": false,
              "tags": [],
              "type": "dashboard"
            },
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "loki",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 11,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "{namespace=\"$namespace\", pod=~\"$pod\", container=~\"$container\"} |~ \"$search\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Leantime Application Logs",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 11
          },
          "id": 2,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "{namespace=\"$namespace\", pod=~\"$pod\", container=~\"$container\"} |~ \"(?i)(500|error|exception|failed|warning|smtp|mail|invite|reset|password)\" |~ \"$search\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Leantime Errors, Mail, and Invite Events",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "leantime",
        "logs",
        "loki"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Loki",
              "value": "Loki"
            },
            "hide": 0,
            "includeAll": false,
            "label": "Loki Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "loki",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": {
              "selected": false,
              "text": "default",
              "value": "default"
            },
            "hide": 0,
            "label": "Namespace",
            "name": "namespace",
            "options": [],
            "query": "default",
            "skipUrlSync": false,
            "type": "textbox"
          },
          {
            "current": {
              "selected": false,
              "text": "leantime-.*",
              "value": "leantime-.*"
            },
            "hide": 0,
            "label": "Pod Regex",
            "name": "pod",
            "options": [],
            "query": "leantime-.*",
            "skipUrlSync": false,
            "type": "textbox"
          },
          {
            "current": {
              "selected": false,
              "text": "leantime",
              "value": "leantime"
            },
            "hide": 0,
            "label": "Container Regex",
            "multi": false,
            "name": "container",
            "options": [],
            "query": "leantime",
            "skipUrlSync": false,
            "type": "textbox"
          },
          {
            "current": {
              "selected": false,
              "text": ".*",
              "value": ".*"
            },
            "hide": 0,
            "label": "Search Regex",
            "name": "search",
            "options": [],
            "query": ".*",
            "skipUrlSync": false,
            "type": "textbox"
          }
        ]
      },
      "time": {
        "from": "now-2h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Leantime Logs",
      "uid": "leantime-logs",
      "version": 1,
      "weekStart": ""
    }
