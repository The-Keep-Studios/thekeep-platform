apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-monitoring-prometheus
  namespace: argocd
spec:
  project: platform
  sources:
  - repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 82.14.0
    helm:
      releaseName: kube-prometheus-stack
      valueFiles:
      - $values/kubernetes/platform/monitoring/kube-prometheus-stack.values.yaml
  - repoURL: "{{ gitops_repo_url }}"
    targetRevision: "{{ gitops_revision }}"
    ref: values
  - repoURL: "{{ gitops_repo_url }}"
    targetRevision: "{{ gitops_revision }}"
    path: kubernetes/platform/monitoring/access
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-monitoring-loki
  namespace: argocd
spec:
  project: platform
  sources:
  - repoURL: https://grafana-community.github.io/helm-charts
    chart: loki
    targetRevision: 13.6.1
    helm:
      releaseName: loki
      valueFiles:
      - $values/kubernetes/platform/monitoring/loki-stack.values.yaml
  - repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: 6.17.1
    helm:
      releaseName: loki-promtail
      valueFiles:
      - $values/kubernetes/platform/monitoring/promtail.values.yaml
  - repoURL: "{{ gitops_repo_url }}"
    targetRevision: "{{ gitops_revision }}"
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
  - group: apps
    kind: StatefulSet
    namespace: monitoring
    name: loki
    jqPathExpressions:
    - '.spec.volumeClaimTemplates[] | select(.metadata.name == "storage") | .apiVersion'
    - '.spec.volumeClaimTemplates[] | select(.metadata.name == "storage") | .kind'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PruneLast=true
    - ServerSideApply=true
