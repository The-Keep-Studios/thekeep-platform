apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-cloudflare-tunnel
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: "{{ gitops_repo_url }}"
    targetRevision: "{{ gitops_revision }}"
    path: kubernetes/platform/cloudflared
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
    - ServerSideApply=true
---
