apiVersion: v1
kind: Namespace
metadata:
  name: twenty
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: twenty-config
  namespace: twenty
data:
  SERVER_URL: "https://twenty.thekeepstudios.com"
  STORAGE_TYPE: "local"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: twenty-postgres-data
  namespace: twenty
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: twenty-server-local-data
  namespace: twenty
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-postgres
  namespace: twenty
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: twenty-postgres
  template:
    metadata:
      labels:
        app: twenty-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRES_DB
          value: default
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: twenty-secrets
              key: PG_DATABASE_PASSWORD
        ports:
        - name: postgres
          containerPort: 5432
        readinessProbe:
          exec:
            command:
            - sh
            - -ceu
            - pg_isready -U postgres -d default
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command:
            - sh
            - -ceu
            - pg_isready -U postgres -d default
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: twenty-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: twenty-postgres
  namespace: twenty
spec:
  type: ClusterIP
  selector:
    app: twenty-postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-redis
  namespace: twenty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twenty-redis
  template:
    metadata:
      labels:
        app: twenty-redis
    spec:
      containers:
      - name: redis
        image: redis:7.4-alpine
        imagePullPolicy: IfNotPresent
        args:
        - --maxmemory-policy
        - noeviction
        ports:
        - name: redis
          containerPort: 6379
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 6
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: twenty-redis
  namespace: twenty
spec:
  type: ClusterIP
  selector:
    app: twenty-redis
  ports:
  - name: redis
    port: 6379
    targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-server
  namespace: twenty
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: twenty-server
  template:
    metadata:
      labels:
        app: twenty-server
    spec:
      containers:
      - name: twenty
        image: twentycrm/twenty:v2.4.0
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_PORT
          value: "3000"
        - name: PG_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: twenty-secrets
              key: PG_DATABASE_PASSWORD
        - name: PG_DATABASE_URL
          value: "postgres://postgres:$(PG_DATABASE_PASSWORD)@twenty-postgres:5432/default"
        - name: SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: twenty-config
              key: SERVER_URL
        - name: REDIS_URL
          value: redis://twenty-redis:6379
        - name: STORAGE_TYPE
          valueFrom:
            configMapKeyRef:
              name: twenty-config
              key: STORAGE_TYPE
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: twenty-secrets
              key: ENCRYPTION_KEY
        - name: APP_SECRET
          valueFrom:
            secretKeyRef:
              name: twenty-secrets
              key: APP_SECRET
        ports:
        - name: http
          containerPort: 3000
        startupProbe:
          httpGet:
            path: /healthz
            port: http
          failureThreshold: 60
          periodSeconds: 10
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 4
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 4
        volumeMounts:
        - name: local-storage
          mountPath: /app/packages/twenty-server/.local-storage
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
      volumes:
      - name: local-storage
        persistentVolumeClaim:
          claimName: twenty-server-local-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-worker
  namespace: twenty
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: twenty-worker
  template:
    metadata:
      labels:
        app: twenty-worker
    spec:
      containers:
      - name: twenty
        image: twentycrm/twenty:v2.4.0
        imagePullPolicy: IfNotPresent
        command:
        - yarn
        - worker:prod
        env:
        - name: PG_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: twenty-secrets
              key: PG_DATABASE_PASSWORD
        - name: PG_DATABASE_URL
          value: "postgres://postgres:$(PG_DATABASE_PASSWORD)@twenty-postgres:5432/default"
        - name: SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: twenty-config
              key: SERVER_URL
        - name: REDIS_URL
          value: redis://twenty-redis:6379
        - name: DISABLE_DB_MIGRATIONS
          value: "true"
        - name: DISABLE_CRON_JOBS_REGISTRATION
          value: "true"
        - name: STORAGE_TYPE
          valueFrom:
            configMapKeyRef:
              name: twenty-config
              key: STORAGE_TYPE
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: twenty-secrets
              key: ENCRYPTION_KEY
        - name: APP_SECRET
          valueFrom:
            secretKeyRef:
              name: twenty-secrets
              key: APP_SECRET
        volumeMounts:
        - name: local-storage
          mountPath: /app/packages/twenty-server/.local-storage
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
      volumes:
      - name: local-storage
        persistentVolumeClaim:
          claimName: twenty-server-local-data
---
apiVersion: v1
kind: Service
metadata:
  name: twenty
  namespace: twenty
spec:
  type: ClusterIP
  selector:
    app: twenty-server
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: twenty-ingress
  namespace: twenty
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: http
spec:
  rules:
  - host: twenty.thekeepstudios.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: twenty
            port:
              number: 80
