apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: espocrm-backup-pvc
  namespace: espocrm
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: espocrm-backup
  namespace: espocrm
spec:
  schedule: "42 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: backup
            image: mariadb:11.8.6-ubi9
            imagePullPolicy: IfNotPresent
            env:
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: espocrm-secrets
                  key: MARIADB_PASSWORD
            command:
            - sh
            - -ceu
            - |
              ts="$(date -u +%Y%m%dT%H%M%SZ)"
              mkdir -p /backup
              mariadb-dump -h espocrm-db -u espocrm "-p${MARIADB_PASSWORD}" --single-transaction espocrm | gzip > "/backup/espocrm_db_${ts}.sql.gz"
              tar -czf "/backup/espocrm_app_data_${ts}.tar.gz" -C /source espocrm-data
              find /backup -type f -name 'espocrm_*' -mtime +14 -delete
              ls -lah /backup
            volumeMounts:
            - name: backup-data
              mountPath: /backup
            - name: app-data
              mountPath: /source/espocrm-data
              readOnly: true
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "1000m"
                memory: "1Gi"
          volumes:
          - name: backup-data
            persistentVolumeClaim:
              claimName: espocrm-backup-pvc
          - name: app-data
            persistentVolumeClaim:
              claimName: espocrm-data
