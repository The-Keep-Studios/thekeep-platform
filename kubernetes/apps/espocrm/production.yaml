apiVersion: v1
kind: Namespace
metadata:
  name: espocrm
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: espocrm-db-data
  namespace: espocrm
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: espocrm-data
  namespace: espocrm
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: espocrm-runtime-config-loader
  namespace: espocrm
data:
  apply-runtime-config.php: |
    <?php

    $inputPath = '/config/email-server-allowed-address-list.json';
    $targetPath = '/var/www/html/data/config-internal-override.php';
    $targetDirectory = dirname($targetPath);

    if (!is_file($inputPath)) {
        exit(0);
    }

    if (!is_dir($targetDirectory) && !mkdir($targetDirectory, 0775, true) && !is_dir($targetDirectory)) {
        throw new RuntimeException('Could not create the EspoCRM data directory.');
    }

    $list = json_decode(file_get_contents($inputPath), true, 512, JSON_THROW_ON_ERROR);

    if (!is_array($list)) {
        throw new RuntimeException('EspoCRM email server allowlist must be a JSON array.');
    }

    foreach ($list as $item) {
        if (!is_string($item)) {
            throw new RuntimeException('EspoCRM email server allowlist entries must be strings.');
        }
    }

    $config = [];

    if (is_file($targetPath)) {
        $loadedConfig = include $targetPath;

        if (!is_array($loadedConfig)) {
            throw new RuntimeException('Existing EspoCRM internal override config must return an array.');
        }

        $config = $loadedConfig;
    }

    $config['emailServerAllowedAddressList'] = array_values($list);

    $tmpPath = tempnam($targetDirectory, '.config-internal-override.');

    if ($tmpPath === false) {
        throw new RuntimeException('Could not create a temporary EspoCRM config file.');
    }

    $contents = "<?php\n\nreturn " . var_export($config, true) . ";\n";

    try {
        if (file_put_contents($tmpPath, $contents, LOCK_EX) === false) {
            throw new RuntimeException('Could not write the EspoCRM config override.');
        }

        if (!rename($tmpPath, $targetPath)) {
            throw new RuntimeException('Could not replace the EspoCRM config override.');
        }

        if (!chmod($targetPath, 0644)) {
            throw new RuntimeException('Could not set permissions on the EspoCRM config override.');
        }
    } finally {
        if (is_file($tmpPath)) {
            unlink($tmpPath);
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: espocrm-db
  namespace: espocrm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: espocrm-db
  template:
    metadata:
      labels:
        app: espocrm-db
    spec:
      containers:
      - name: mariadb
        image: mariadb:11.8.6-ubi9
        imagePullPolicy: IfNotPresent
        env:
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: espocrm-secrets
              key: MARIADB_ROOT_PASSWORD
        - name: MARIADB_DATABASE
          value: espocrm
        - name: MARIADB_USER
          value: espocrm
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: espocrm-secrets
              key: MARIADB_PASSWORD
        ports:
        - name: mysql
          containerPort: 3306
        readinessProbe:
          exec:
            command:
            - healthcheck.sh
            - --connect
            - --innodb_initialized
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          exec:
            command:
            - healthcheck.sh
            - --connect
            - --innodb_initialized
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 6
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: espocrm-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: espocrm-db
  namespace: espocrm
spec:
  type: ClusterIP
  selector:
    app: espocrm-db
  ports:
  - name: mysql
    port: 3306
    targetPort: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: espocrm
  namespace: espocrm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: espocrm
      component: web
  template:
    metadata:
      labels:
        app: espocrm
        component: web
    spec:
      initContainers:
      - name: espocrm-runtime-config
        image: espocrm/espocrm:9.3.8
        imagePullPolicy: IfNotPresent
        command:
        - php
        - /runtime-config-loader/apply-runtime-config.php
        volumeMounts:
        - name: data
          mountPath: /var/www/html
        - name: runtime-config
          mountPath: /config
          readOnly: true
        - name: runtime-config-loader
          mountPath: /runtime-config-loader
          readOnly: true
      containers:
      - name: espocrm
        image: espocrm/espocrm:9.3.8
        imagePullPolicy: IfNotPresent
        env:
        - name: ESPOCRM_DATABASE_PLATFORM
          value: Mysql
        - name: ESPOCRM_DATABASE_HOST
          value: espocrm-db
        - name: ESPOCRM_DATABASE_NAME
          value: espocrm
        - name: ESPOCRM_DATABASE_USER
          value: espocrm
        - name: ESPOCRM_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: espocrm-secrets
              key: MARIADB_PASSWORD
        - name: ESPOCRM_ADMIN_USERNAME
          value: admin
        - name: ESPOCRM_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: espocrm-secrets
              key: ESPOCRM_ADMIN_PASSWORD
        - name: ESPOCRM_SITE_URL
          value: "https://espocrm.thekeepstudios.com"
        ports:
        - name: http
          containerPort: 80
        startupProbe:
          httpGet:
            path: /
            port: http
          failureThreshold: 60
          periodSeconds: 10
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 4
        livenessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 4
        volumeMounts:
        - name: data
          mountPath: /var/www/html
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: espocrm-data
      - name: runtime-config
        configMap:
          name: espocrm-runtime-config
          optional: true
      - name: runtime-config-loader
        configMap:
          name: espocrm-runtime-config-loader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: espocrm-daemon
  namespace: espocrm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: espocrm
      component: daemon
  template:
    metadata:
      labels:
        app: espocrm
        component: daemon
    spec:
      initContainers:
      - name: espocrm-runtime-config
        image: espocrm/espocrm:9.3.8
        imagePullPolicy: IfNotPresent
        command:
        - php
        - /runtime-config-loader/apply-runtime-config.php
        volumeMounts:
        - name: data
          mountPath: /var/www/html
        - name: runtime-config
          mountPath: /config
          readOnly: true
        - name: runtime-config-loader
          mountPath: /runtime-config-loader
          readOnly: true
      containers:
      - name: espocrm-daemon
        image: espocrm/espocrm:9.3.8
        imagePullPolicy: IfNotPresent
        command:
        - docker-daemon.sh
        volumeMounts:
        - name: data
          mountPath: /var/www/html
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: espocrm-data
      - name: runtime-config
        configMap:
          name: espocrm-runtime-config
          optional: true
      - name: runtime-config-loader
        configMap:
          name: espocrm-runtime-config-loader
---
apiVersion: v1
kind: Service
metadata:
  name: espocrm
  namespace: espocrm
spec:
  type: ClusterIP
  selector:
    app: espocrm
    component: web
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: espocrm-ingress
  namespace: espocrm
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: http
spec:
  rules:
  - host: espocrm.thekeepstudios.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: espocrm
            port:
              number: 80
