apiVersion: v1
kind: Namespace
metadata:
  name: espocrm
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: espocrm-db-data
  namespace: espocrm
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: espocrm-data
  namespace: espocrm
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: espocrm-db
  namespace: espocrm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: espocrm-db
  template:
    metadata:
      labels:
        app: espocrm-db
    spec:
      containers:
      - name: mariadb
        image: mariadb:11.8.6-ubi9
        imagePullPolicy: IfNotPresent
        env:
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: espocrm-secrets
              key: MARIADB_ROOT_PASSWORD
        - name: MARIADB_DATABASE
          value: espocrm
        - name: MARIADB_USER
          value: espocrm
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: espocrm-secrets
              key: MARIADB_PASSWORD
        ports:
        - name: mysql
          containerPort: 3306
        readinessProbe:
          exec:
            command:
            - healthcheck.sh
            - --connect
            - --innodb_initialized
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          exec:
            command:
            - healthcheck.sh
            - --connect
            - --innodb_initialized
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 6
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: espocrm-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: espocrm-db
  namespace: espocrm
spec:
  type: ClusterIP
  selector:
    app: espocrm-db
  ports:
  - name: mysql
    port: 3306
    targetPort: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: espocrm
  namespace: espocrm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: espocrm
      component: web
  template:
    metadata:
      labels:
        app: espocrm
        component: web
    spec:
      containers:
      - name: espocrm
        image: espocrm/espocrm:9.3.8
        imagePullPolicy: IfNotPresent
        env:
        - name: ESPOCRM_DATABASE_PLATFORM
          value: Mysql
        - name: ESPOCRM_DATABASE_HOST
          value: espocrm-db
        - name: ESPOCRM_DATABASE_NAME
          value: espocrm
        - name: ESPOCRM_DATABASE_USER
          value: espocrm
        - name: ESPOCRM_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: espocrm-secrets
              key: MARIADB_PASSWORD
        - name: ESPOCRM_ADMIN_USERNAME
          value: admin
        - name: ESPOCRM_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: espocrm-secrets
              key: ESPOCRM_ADMIN_PASSWORD
        - name: ESPOCRM_SITE_URL
          value: "https://espocrm.thekeepstudios.com"
        ports:
        - name: http
          containerPort: 80
        startupProbe:
          httpGet:
            path: /
            port: http
          failureThreshold: 60
          periodSeconds: 10
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 4
        livenessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 4
        volumeMounts:
        - name: data
          mountPath: /var/www/html
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: espocrm-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: espocrm-daemon
  namespace: espocrm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: espocrm
      component: daemon
  template:
    metadata:
      labels:
        app: espocrm
        component: daemon
    spec:
      containers:
      - name: espocrm-daemon
        image: espocrm/espocrm:9.3.8
        imagePullPolicy: IfNotPresent
        command:
        - docker-daemon.sh
        volumeMounts:
        - name: data
          mountPath: /var/www/html
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: espocrm-data
---
apiVersion: v1
kind: Service
metadata:
  name: espocrm
  namespace: espocrm
spec:
  type: ClusterIP
  selector:
    app: espocrm
    component: web
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: espocrm-ingress
  namespace: espocrm
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: http
spec:
  rules:
  - host: espocrm.thekeepstudios.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: espocrm
            port:
              number: 80
