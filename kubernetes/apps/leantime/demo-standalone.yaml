apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: leantime-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: leantime-mariadb-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leantime-mariadb
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: leantime-mariadb
  template:
    metadata:
      labels:
        app: leantime-mariadb
    spec:
      containers:
      - name: mariadb
        image: mariadb:11
        imagePullPolicy: IfNotPresent
        ports:
        - name: mysql
          containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "leantime-root-pass"
        - name: MYSQL_DATABASE
          value: "leantime"
        - name: MYSQL_USER
          value: "leantime"
        - name: MYSQL_PASSWORD
          value: "leantime-pass"
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - mariadb-admin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - mariadb-admin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: mariadb-data
          mountPath: /var/lib/mysql
      volumes:
      - name: mariadb-data
        persistentVolumeClaim:
          claimName: leantime-mariadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: leantime-mariadb
spec:
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
    protocol: TCP
  selector:
    app: leantime-mariadb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leantime-mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leantime-mailpit
  template:
    metadata:
      labels:
        app: leantime-mailpit
    spec:
      containers:
      - name: mailpit
        image: axllent/mailpit:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: smtp
          containerPort: 1025
        - name: http
          containerPort: 8025
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: leantime-mailpit
spec:
  type: ClusterIP
  ports:
  - name: smtp
    port: 1025
    targetPort: smtp
    protocol: TCP
  - name: http
    port: 8025
    targetPort: http
    protocol: TCP
  selector:
    app: leantime-mailpit
---
apiVersion: v1
kind: Service
metadata:
  name: leantime-mailpit-ui
spec:
  type: NodePort
  ports:
  - name: http
    port: 8025
    targetPort: http
    nodePort: 30082
    protocol: TCP
  selector:
    app: leantime-mailpit
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leantime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leantime
  template:
    metadata:
      labels:
        app: leantime
    spec:
      initContainers:
      - name: wait-for-mariadb
        image: mariadb:11
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          until mariadb-admin ping -h leantime-mariadb -uleantime -pleantime-pass --silent; do
            echo "waiting for leantime-mariadb to become ready"
            sleep 2
          done
      containers:
      - name: leantime
        image: leantime/leantime:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: LEAN_DB_DEFAULT_CONNECTION
          value: "mysql"
        - name: LEAN_DB_HOST
          value: "leantime-mariadb"
        - name: LEAN_DB_PORT
          value: "3306"
        - name: LEAN_DB_DATABASE
          value: "leantime"
        - name: LEAN_DB_USER
          value: "leantime"
        - name: LEAN_DB_PASSWORD
          value: "leantime-pass"
        - name: LEAN_APP_URL
          value: "https://localhost"
        - name: LEAN_EMAIL_RETURN
          value: "noreply@localhost"
        - name: LEAN_EMAIL_USE_SMTP
          value: "true"
        - name: LEAN_EMAIL_SMTP_HOSTS
          value: "leantime-mailpit"
        - name: LEAN_EMAIL_SMTP_AUTH
          value: "false"
        - name: LEAN_EMAIL_SMTP_AUTO_TLS
          value: "false"
        - name: LEAN_EMAIL_SMTP_PORT
          value: "1025"
        readinessProbe:
          httpGet:
            path: /auth/login
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /auth/login
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: leantime-vol
          mountPath: /var/www/html/user/data
      volumes:
      - name: leantime-vol
        persistentVolumeClaim:
          claimName: leantime-data
---
apiVersion: v1
kind: Service
metadata:
  name: leantime
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
    name: http
  selector:
    app: leantime
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leantime-ingress
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: http
spec:
  tls:
  - hosts:
    - localhost
    secretName: leantime-tls
  rules:
  - host: localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: leantime
            port:
              number: 80
