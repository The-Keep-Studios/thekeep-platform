apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: leantime-mailpit-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leantime-mailpit
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: leantime-mailpit
  template:
    metadata:
      labels:
        app: leantime-mailpit
    spec:
      containers:
      - name: mailpit
        image: axllent/mailpit:v1.29.6
        imagePullPolicy: IfNotPresent
        env:
        - name: MP_DATABASE
          value: /data/mailpit.db
        - name: MP_MAX_MESSAGES
          value: "5000"
        - name: MP_DISABLE_VERSION_CHECK
          value: "true"
        ports:
        - name: smtp
          containerPort: 1025
        - name: http
          containerPort: 8025
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 5
        volumeMounts:
        - name: mailpit-data
          mountPath: /data
        resources:
          requests:
            cpu: "25m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
      volumes:
      - name: mailpit-data
        persistentVolumeClaim:
          claimName: leantime-mailpit-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: leantime-mailpit
spec:
  type: ClusterIP
  ports:
  - name: smtp
    port: 1025
    targetPort: smtp
    protocol: TCP
  - name: http
    port: 8025
    targetPort: http
    protocol: TCP
  selector:
    app: leantime-mailpit
