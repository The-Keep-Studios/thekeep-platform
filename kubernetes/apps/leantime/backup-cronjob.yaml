apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: leantime-backup-pvc
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: leantime-db-backup
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: mariadb:11.8.6-ubi9
            imagePullPolicy: IfNotPresent
            env:
            - name: MYSQL_HOST
              value: leantime-mariadb
            - name: MYSQL_DATABASE
              value: leantime
            - name: MYSQL_USER
              value: leantime_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: leantime-db
                  key: MYSQL_PASSWORD
            command:
            - sh
            - -ceu
            - |
              ts="$(date -u +%Y%m%dT%H%M%SZ)"
              dump_bin="mariadb-dump"
              if ! command -v "${dump_bin}" >/dev/null 2>&1; then
                dump_bin="mysqldump"
              fi
              out="/backup/leantime_${ts}.sql.gz"
              MYSQL_PWD="${MYSQL_PASSWORD}" "${dump_bin}" \
                --single-transaction \
                --quick \
                -h "${MYSQL_HOST}" \
                -u "${MYSQL_USER}" \
                "${MYSQL_DATABASE}" | gzip > "${out}"
              find /backup -type f -name 'leantime_*.sql.gz' -mtime +7 -delete
            volumeMounts:
            - name: backup-data
              mountPath: /backup
            resources:
              requests:
                cpu: "50m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"
          volumes:
          - name: backup-data
            persistentVolumeClaim:
              claimName: leantime-backup-pvc
