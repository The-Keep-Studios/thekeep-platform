# 1. MariaDB for Leantime
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: leantime-mariadb-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: leantime-runtime-defaults
data:
  LEAN_APP_URL: "https://projects.thekeepstudios.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leantime-mariadb
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: leantime-mariadb
  template:
    metadata:
      labels:
        app: leantime-mariadb
    spec:
      containers:
      - name: mariadb
        image: mariadb:11
        imagePullPolicy: IfNotPresent
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "root-password-change-me"
        - name: MYSQL_DATABASE
          value: "leantime"
        - name: MYSQL_USER
          value: "leantime_user"
        - name: MYSQL_PASSWORD
          value: "leantime-password-change-me"
        ports:
        - name: mysql
          containerPort: 3306
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - mariadb-admin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - mariadb-admin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/mysql
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: leantime-mariadb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: leantime-mariadb
spec:
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
    protocol: TCP
  selector:
    app: leantime-mariadb
---
# 2. Leantime Application
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: leantime-app-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leantime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leantime
  template:
    metadata:
      labels:
        app: leantime
    spec:
      initContainers:
      - name: wait-for-mariadb
        image: mariadb:11
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          until mariadb-admin ping -h leantime-mariadb -uleantime_user -pleantime-password-change-me --silent; do
            echo "waiting for leantime-mariadb to become ready"
            sleep 2
          done
      containers:
      - name: leantime
        image: leantime/leantime:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: leantime-runtime-defaults
        - secretRef:
            name: leantime-oidc
            optional: true
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: LEAN_DB_DEFAULT_CONNECTION
          value: "mysql"
        - name: LEAN_DB_HOST
          value: "leantime-mariadb"
        - name: LEAN_DB_PORT
          value: "3306"
        - name: LEAN_DB_USER
          value: "leantime_user"
        - name: LEAN_DB_PASSWORD
          value: "leantime-password-change-me"
        - name: LEAN_DB_DATABASE
          value: "leantime"
        readinessProbe:
          httpGet:
            path: /auth/login
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /auth/login
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: leantime-vol
          mountPath: /var/www/html/user/data
      volumes:
      - name: leantime-vol
        persistentVolumeClaim:
          claimName: leantime-app-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: leantime
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: leantime
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leantime-ingress
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: http
spec:
  rules:
  - host: projects.thekeepstudios.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: leantime
            port:
              number: 80
