# 1. MariaDB for Leantime
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: leantime-mariadb-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: leantime-runtime-defaults
data:
  LEAN_APP_URL: "https://projects.thekeepstudios.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leantime-mariadb
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: leantime-mariadb
  template:
    metadata:
      labels:
        app: leantime-mariadb
    spec:
      containers:
      - name: mariadb
        image: mariadb:11.8.6-ubi9
        imagePullPolicy: IfNotPresent
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: leantime-db
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_DATABASE
          value: "leantime"
        - name: MYSQL_USER
          value: "leantime_user"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: leantime-db
              key: MYSQL_PASSWORD
        ports:
        - name: mysql
          containerPort: 3306
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - mariadb-admin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - mariadb-admin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/mysql
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: leantime-mariadb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: leantime-mariadb
spec:
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
    protocol: TCP
  selector:
    app: leantime-mariadb
---
# 2. Leantime Application
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: leantime-app-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: leantime-plugins-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leantime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leantime
  template:
    metadata:
      labels:
        app: leantime
    spec:
      initContainers:
      - name: prepare-leantime-log-dir
        image: leantime/leantime:3.8.0
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        command:
        - sh
        - -ceu
        - |
          mkdir -p /var/www/html/storage/logs
          chown -R 1000:1000 /var/www/html/storage/logs
          chmod 0775 /var/www/html/storage/logs
        volumeMounts:
        - name: leantime-app-logs
          mountPath: /var/www/html/storage/logs
      - name: wait-for-mariadb
        image: mariadb:11.8.6-ubi9
        imagePullPolicy: IfNotPresent
        env:
        - name: MYSQL_USER
          value: "leantime_user"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: leantime-db
              key: MYSQL_PASSWORD
        command:
        - sh
        - -c
        - |
          until mariadb-admin ping -h leantime-mariadb -u"${MYSQL_USER}" -p"${MYSQL_PASSWORD}" --silent; do
            echo "waiting for leantime-mariadb to become ready"
            sleep 2
          done
      containers:
      - name: leantime
        image: leantime/leantime:3.8.0
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: leantime-runtime-defaults
        - secretRef:
            name: leantime-oidc
            optional: true
        - secretRef:
            name: leantime-email
            optional: true
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: LEAN_DB_DEFAULT_CONNECTION
          value: "mysql"
        - name: LEAN_DB_HOST
          value: "leantime-mariadb"
        - name: LEAN_DB_PORT
          value: "3306"
        - name: LEAN_DB_USER
          value: "leantime_user"
        - name: LEAN_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: leantime-db
              key: MYSQL_PASSWORD
        - name: LEAN_DB_DATABASE
          value: "leantime"
        readinessProbe:
          httpGet:
            path: /auth/login
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /auth/login
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: leantime-vol
          mountPath: /var/www/html/user/data
        - name: leantime-plugins
          mountPath: /var/www/html/app/Plugins
        - name: leantime-app-logs
          mountPath: /var/www/html/storage/logs
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      - name: leantime-app-log-tail
        image: leantime/leantime:3.8.0
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -ceu
        - |
          log_dir=/var/www/html/storage/logs
          mkdir -p "${log_dir}"
          touch "${log_dir}/leantime.log" "${log_dir}/deprecations.log"
          echo "Tailing Leantime application log files from ${log_dir}"
          while true; do
            current_day="$(date +%F)"
            daily_log="${log_dir}/leantime-${current_day}.log"
            touch "${daily_log}"
            tail -n +1 -F \
              "${log_dir}/leantime.log" \
              "${log_dir}/deprecations.log" \
              "${daily_log}" &
            tail_pid="$!"
            while [ "$(date +%F)" = "${current_day}" ]; do
              sleep 300
            done
            kill "${tail_pid}" >/dev/null 2>&1 || true
            wait "${tail_pid}" >/dev/null 2>&1 || true
          done
        volumeMounts:
        - name: leantime-app-logs
          mountPath: /var/www/html/storage/logs
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
      volumes:
      - name: leantime-vol
        persistentVolumeClaim:
          claimName: leantime-app-pvc
      - name: leantime-plugins
        persistentVolumeClaim:
          claimName: leantime-plugins-pvc
      - name: leantime-app-logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: leantime
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: leantime
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leantime-ingress
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: http
spec:
  rules:
  - host: projects.thekeepstudios.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: leantime
            port:
              number: 80
