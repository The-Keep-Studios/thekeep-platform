apiVersion: v1
kind: Namespace
metadata:
  name: wisemapping
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wisemapping-config
  namespace: wisemapping
data:
  application.yml: |-
    spring:
      datasource:
        url: "jdbc:postgresql://wisemapping-postgres:5432/wisemapping"
        driver-class-name: "org.postgresql.Driver"
        username: "wisemapping"
        password: "${WISEMAPPING_POSTGRES_PASSWORD}"
      jpa:
        hibernate:
          ddl-auto: "validate"
        properties:
          hibernate:
            dialect: "org.hibernate.dialect.PostgreSQLDialect"
      sql:
        init:
          platform: "postgresql"
    app:
      site:
        ui-base-url: "https://mindmaps.thekeepstudios.com"
        api-base-url: "https://mindmaps.thekeepstudios.com"
      jwt:
        secret: "${WISEMAPPING_JWT_SECRET}"
        expirationMin: 10080
      oauth:
        token:
          secret: "${WISEMAPPING_OAUTH_TOKEN_SECRET}"
      mail:
        sender-email: "${WISEMAPPING_MAIL_SENDER_EMAIL:}"
        enabled: ${WISEMAPPING_MAIL_ENABLED:false}
        host: "${WISEMAPPING_MAIL_HOST:}"
        port: ${WISEMAPPING_MAIL_PORT:587}
        username: "${WISEMAPPING_MAIL_USERNAME:}"
        password: "${WISEMAPPING_MAIL_PASSWORD:}"
      dialog:
        registration:
          enabled: true
          email-confirmation-enabled: true
    ---
    spring:
      config:
        activate:
          on-profile: "oidc"
    app:
      security:
        oauth2:
          google:
            enabled: true
            clientId: "${OAUTH_GOOGLE_CLIENT_ID}"
            clientSecret: "${OAUTH_GOOGLE_CLIENT_SECRET}"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wisemapping-postgres-data
  namespace: wisemapping
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wisemapping-postgres
  namespace: wisemapping
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wisemapping-postgres
  template:
    metadata:
      labels:
        app: wisemapping-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16.13-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: postgres
          containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: wisemapping
        - name: POSTGRES_USER
          value: wisemapping
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wisemapping-secrets
              key: WISEMAPPING_POSTGRES_PASSWORD
        readinessProbe:
          tcpSocket:
            port: postgres
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          tcpSocket:
            port: postgres
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: wisemapping-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: wisemapping-postgres
  namespace: wisemapping
spec:
  selector:
    app: wisemapping-postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wisemapping
  namespace: wisemapping
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wisemapping
  template:
    metadata:
      labels:
        app: wisemapping
      annotations:
        app.kubernetes.io/config-version: "wisemapping-postgres-oidc-profile-v1"
    spec:
      containers:
      - name: wisemapping
        image: wisemapping/wisemapping:6.0.7
        imagePullPolicy: IfNotPresent
        envFrom:
        - secretRef:
            name: wisemapping-secrets
        - secretRef:
            name: wisemapping-email
            optional: true
        ports:
        - name: http
          containerPort: 80
        readinessProbe:
          httpGet:
            path: /api/restful/app/config
            port: http
            httpHeaders:
            - name: Host
              value: mindmaps.thekeepstudios.com
            - name: X-Forwarded-Proto
              value: https
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /api/restful/app/config
            port: http
            httpHeaders:
            - name: Host
              value: mindmaps.thekeepstudios.com
            - name: X-Forwarded-Proto
              value: https
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 4
        volumeMounts:
        - name: app-config
          mountPath: /app/config/application.yml
          subPath: application.yml
          readOnly: true
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
      volumes:
      - name: app-config
        configMap:
          name: wisemapping-config
          items:
          - key: application.yml
            path: application.yml
---
apiVersion: v1
kind: Service
metadata:
  name: wisemapping
  namespace: wisemapping
spec:
  type: ClusterIP
  selector:
    app: wisemapping
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wisemapping-ingress
  namespace: wisemapping
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: http
spec:
  rules:
  - host: mindmaps.thekeepstudios.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wisemapping
            port:
              number: 80
