apiVersion: v1
kind: Namespace
metadata:
  name: localai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localai
  namespace: localai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localai
  template:
    metadata:
      labels:
        app: localai
    spec:
      containers:
      - name: localai
        image: localai/localai:sha-ad3c8c4
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: MODELS_PATH
          value: "/models"
        resources:
          requests:
            cpu: "4"
            memory: "16Gi"
          limits:
            cpu: "16"
            memory: "64Gi"
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
        volumeMounts:
        - name: models
          mountPath: /models
      volumes:
      - name: models
        hostPath:
          path: /opt/localai/models
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: localai
  namespace: localai
spec:
  type: ClusterIP
  selector:
    app: localai
  ports:
  - name: http
    port: 8080
    targetPort: http
