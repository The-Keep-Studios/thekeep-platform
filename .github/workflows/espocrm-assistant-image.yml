name: EspoCRM Assistant Image

# This workflow validates and packages the Kubernetes-deployed assistant image.
# It is not a local development prerequisite. Non-GitHub installs can build or
# mirror the image and update the Kubernetes manifest to that registry/tag.

on:
  pull_request:
    paths:
    - services/espocrm-assistant/**
    - kubernetes/apps/espocrm-assistant/**
    - .github/workflows/espocrm-assistant-image.yml
  push:
    branches:
    - main
    tags:
    - v*
    paths:
    - services/espocrm-assistant/**
    - kubernetes/apps/espocrm-assistant/**
    - .github/workflows/espocrm-assistant-image.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install assistant package
      working-directory: services/espocrm-assistant
      run: python -m pip install -e .

    - name: Run unit tests
      working-directory: services/espocrm-assistant
      run: python -m unittest discover -s tests -v

    - name: Validate runtime entrypoints
      run: python -c "from espocrm_assistant.server import main_streamable_http; from espocrm_assistant.http_server import dispatch_approval; print('entrypoints ok')"

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: v1.35.3

    - name: Render EspoCRM assistant manifests
      run: kubectl kustomize kubernetes/apps/espocrm-assistant

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/the-keep-studios/thekeep-platform/espocrm-assistant
        tags: |
          type=sha,prefix=sha-
          type=ref,event=tag
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build image
      uses: docker/build-push-action@v6
      with:
        context: services/espocrm-assistant
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
