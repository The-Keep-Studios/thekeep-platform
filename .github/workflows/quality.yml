name: Quality Checks

on:
  pull_request:
    paths:
      - ".github/workflows/quality.yml"
      - ".gitignore"
      - "**/*.md"
      - "**/*.sh"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.json"
      - "README.md"
      - "ansible.cfg"
      - "ansible/**"
      - "kubernetes/**"
      - "scripts/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/quality.yml"
      - ".gitignore"
      - "**/*.md"
      - "**/*.sh"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.json"
      - "README.md"
      - "ansible.cfg"
      - "ansible/**"
      - "kubernetes/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install actionlint
        run: |
          mkdir -p "${HOME}/.local/bin"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz" \
            | tar -xz -C "${HOME}/.local/bin" actionlint
          chmod +x "${HOME}/.local/bin/actionlint"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Install Ansible
        run: python -m pip install ansible-core==2.16.3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.33.0

      - name: Run quality checks
        env:
          QUALITY_REQUIRE_ACTIONLINT: "true"
        run: scripts/test-quality.sh
