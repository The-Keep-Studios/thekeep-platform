- name: Check for k3s kubeconfig
  ansible.builtin.stat:
    path: /etc/rancher/k3s/k3s.yaml
  register: k3s_kubeconfig

- name: Fail if k3s is not installed
  ansible.builtin.fail:
    msg: "k3s is not installed or kubeconfig is missing. Run the k3s role first (e.g., --tags k3s)."
  when: not k3s_kubeconfig.stat.exists

- name: Ensure LocalAI models directory exists
  ansible.builtin.file:
    path: "{{ localai_models_host_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure LocalAI manifest directory exists
  ansible.builtin.file:
    path: /opt/localai
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render LocalAI Kubernetes manifest
  ansible.builtin.template:
    src: localai.yaml.j2
    dest: /opt/localai/localai.yaml
    mode: "0644"

- name: Apply LocalAI Kubernetes manifest
  ansible.builtin.command: /usr/local/bin/kubectl apply -f /opt/localai/localai.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for LocalAI pod to be ready
  ansible.builtin.command: >
    /usr/local/bin/kubectl -n {{ localai_namespace }}
    wait --for=condition=ready pod -l app=localai --timeout=180s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: localai_wait
  retries: 5
  delay: 5
  until: localai_wait.rc == 0
  changed_when: false

- name: Smoke test LocalAI service from inside the pod
  ansible.builtin.command:
    argv:
      - /usr/local/bin/kubectl
      - -n
      - "{{ localai_namespace }}"
      - exec
      - deploy/localai
      - --
      - sh
      - -c
      - "if command -v curl >/dev/null 2>&1; then curl -sf http://localai:{{ localai_port }}/readyz || curl -sf http://localai:{{ localai_port }}/; elif command -v wget >/dev/null 2>&1; then wget -qO- http://localai:{{ localai_port }}/readyz || wget -qO- http://localai:{{ localai_port }}/; else echo 'no curl or wget in container'; fi"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
