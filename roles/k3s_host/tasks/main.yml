- name: Ensure curl is installed (for k3s install script)
  ansible.builtin.apt:
    name: curl
    state: present
    update_cache: true

- name: Check for existing k3s install
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: "0755"
  when: not k3s_bin.stat.exists

- name: Install k3s
  ansible.builtin.command: sh /tmp/k3s-install.sh
  environment:
    K3S_KUBECONFIG_MODE: "644"
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_bin.stat.exists

- name: Enable and start k3s
  ansible.builtin.service:
    name: k3s
    enabled: true
    state: started

- name: Check for kubeconfig
  ansible.builtin.stat:
    path: /etc/rancher/k3s/k3s.yaml
  register: k3s_kubeconfig

- name: Ensure kubeconfig is readable
  ansible.builtin.file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: "0644"
  when: k3s_kubeconfig.stat.exists

- name: Check for kubectl in PATH
  ansible.builtin.stat:
    path: /usr/local/bin/kubectl
  register: kubectl_bin

- name: Symlink kubectl to k3s binary
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
  when: not kubectl_bin.stat.exists

- name: Wait for k3s API to be ready
  ansible.builtin.command: /usr/local/bin/kubectl get nodes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: kubectl_nodes
  retries: 20
  delay: 6
  until: kubectl_nodes.rc == 0
  changed_when: false

- name: Verify kubectl works as the current user
  become: false
  ansible.builtin.command: /usr/local/bin/kubectl get nodes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: kubectl_nodes_user
  retries: 10
  delay: 3
  until: kubectl_nodes_user.rc == 0
  changed_when: false
