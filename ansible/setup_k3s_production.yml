- name: Setup K3s Production Host(s)
  hosts: k3s_control_plane
  become: true
  pre_tasks:
    - name: Ensure production_vars.yml exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/production_vars.yml"
      register: prod_vars_stat
      delegate_to: localhost
      become: false
      tags: [always]

    - name: Fail if production_vars.yml is missing
      ansible.builtin.fail:
        msg: "production_vars.yml is missing! Copy production_vars.yml.example and fill it in."
      when: not prod_vars_stat.stat.exists
      delegate_to: localhost
      become: false
      tags: [always]

    - name: Load production variables after preflight
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/production_vars.yml"
      tags: [always]

    - name: Define required production secret keys
      ansible.builtin.set_fact:
        required_platform_secret_keys:
          - authentik_secret_key
          - authentik_postgres_password
          - authentik_bootstrap_email
          - authentik_bootstrap_password
          - leantime_db_root_password
          - leantime_db_password
          - wisemapping_postgres_password
          - wisemapping_jwt_secret
          - wisemapping_oauth_token_secret
          - cloudflare_tunnel_token
          - grafana_admin_user
          - grafana_admin_password
        production_placeholder_values:
          - change_me
          - changeme
          - replace_me
          - replaceme
          - todo
          - example
          - example_value
          - your_value_here
          - your_secret_here
      tags: [always]

    - name: Fail if platform_secrets is missing
      ansible.builtin.fail:
        msg: "platform_secrets is missing from production_vars.yml."
      when: platform_secrets is not defined
      tags: [always]

    - name: Fail if platform_secrets is not a mapping
      ansible.builtin.fail:
        msg: "platform_secrets must be a YAML mapping in production_vars.yml."
      when:
        - platform_secrets is defined
        - platform_secrets | type_debug != "dict"
      tags: [always]

    - name: Detect missing required production secrets
      ansible.builtin.set_fact:
        missing_platform_secret_keys: "{{ required_platform_secret_keys | difference(platform_secrets.keys() | list) }}"
      tags: [always]

    - name: Fail if required production secrets are missing
      ansible.builtin.fail:
        msg: "production_vars.yml is missing required platform_secrets keys: {{ missing_platform_secret_keys | join(', ') }}"
      when: missing_platform_secret_keys | length > 0
      tags: [always]

    - name: Fail if required production secrets are empty or placeholders
      ansible.builtin.fail:
        msg: "The production secret {{ item }} is empty or still set to a placeholder value."
      vars:
        secret_value: "{{ platform_secrets[item] | default('') | string }}"
        normalized_secret_value: "{{ secret_value | trim | lower }}"
      loop: "{{ required_platform_secret_keys }}"
      when: >
        (secret_value | trim | length == 0) or
        (normalized_secret_value in production_placeholder_values) or
        (normalized_secret_value is match('^(change[_-]?me|replace[_-]?me|todo|example|your[_ -]?value|your[_ -]?secret)'))
      delegate_to: localhost
      become: false
      tags: [always]

    - name: Normalize optional CRM app flags
      ansible.builtin.set_fact:
        platform_optional_twenty_enabled: "{{ ((platform_optional_apps | default({})).twenty | default({})).enabled | default(false) | bool }}"
        platform_optional_espocrm_enabled: "{{ ((platform_optional_apps | default({})).espocrm | default({})).enabled | default(false) | bool }}"
        platform_optional_espocrm_assistant_enabled: "{{ ((platform_optional_apps | default({})).espocrm_assistant | default({})).enabled | default(false) | bool }}"
      tags: [always]

    - name: Fail if EspoCRM assistant is enabled without EspoCRM
      ansible.builtin.fail:
        msg: "platform_optional_apps.espocrm_assistant.enabled requires platform_optional_apps.espocrm.enabled."
      when:
        - platform_optional_espocrm_assistant_enabled | bool
        - not (platform_optional_espocrm_enabled | bool)
      tags: [always]

    - name: Validate EspoCRM email configuration
      ansible.builtin.import_role:
        name: espocrm_email_config
        tasks_from: validate
      tags: [always]

    - name: Define required optional CRM secret keys
      ansible.builtin.set_fact:
        required_optional_crm_secret_keys: >-
          {{
            (['twenty_pg_database_password', 'twenty_encryption_key', 'twenty_app_secret'] if (platform_optional_twenty_enabled | bool) else []) +
            (['espocrm_db_root_password', 'espocrm_db_password', 'espocrm_admin_password'] if (platform_optional_espocrm_enabled | bool) else []) +
            (['espocrm_assistant_read_api_key', 'espocrm_assistant_token'] if (platform_optional_espocrm_assistant_enabled | bool) else [])
          }}
      tags: [always]

    - name: Detect missing optional CRM secrets
      ansible.builtin.set_fact:
        missing_optional_crm_secret_keys: "{{ required_optional_crm_secret_keys | difference(platform_secrets.keys() | list) }}"
      when: required_optional_crm_secret_keys | length > 0
      tags: [always]

    - name: Fail if optional CRM secrets are missing
      ansible.builtin.fail:
        msg: "production_vars.yml is missing optional CRM platform_secrets keys: {{ missing_optional_crm_secret_keys | join(', ') }}"
      when:
        - required_optional_crm_secret_keys | length > 0
        - missing_optional_crm_secret_keys | default([]) | length > 0
      tags: [always]

    - name: Fail if optional CRM secrets are empty or placeholders
      ansible.builtin.fail:
        msg: "The optional CRM production secret {{ item }} is empty or still set to a placeholder value."
      vars:
        secret_value: "{{ platform_secrets[item] | default('') | string }}"
        normalized_secret_value: "{{ secret_value | trim | lower }}"
      loop: "{{ required_optional_crm_secret_keys | default([]) }}"
      when: >
        (required_optional_crm_secret_keys | length > 0) and
        (
          (secret_value | trim | length == 0) or
          (normalized_secret_value in production_placeholder_values) or
          (normalized_secret_value is match('^(change[_-]?me|replace[_-]?me|todo|example|your[_ -]?value|your[_ -]?secret)'))
        )
      tags: [always]

    - name: Fail if WiseMapping OIDC is enabled without provider settings
      ansible.builtin.fail:
        msg: >-
          platform_oidc.wisemapping.enable is true, but google_client_id,
          google_client_secret, and google_issuer_uri must all be configured.
          Use the Authentik issuer URL for google_issuer_uri when Authentik is the upstream provider.
      when: >
        (platform_oidc.wisemapping.enable | default(false) | bool) and
        (
          (platform_oidc.wisemapping.google_client_id | default('') | trim | length == 0) or
          (platform_oidc.wisemapping.google_client_secret | default('') | trim | length == 0) or
          (platform_oidc.wisemapping.google_issuer_uri | default('') | trim | length == 0)
        )
      delegate_to: localhost
      become: false
      tags: [always]

    - name: Define required Leantime SMTP settings
      ansible.builtin.set_fact:
        required_leantime_smtp_keys: >-
          {{
            ['return', 'smtp_hosts', 'smtp_port'] +
            (((platform_email.leantime.smtp_auth | default(true)) | bool) |
            ternary(['smtp_username', 'smtp_password'], []))
          }}
      when: platform_email.leantime.use_smtp | default(false) | bool
      tags: [always]

    - name: Detect missing required Leantime SMTP settings
      ansible.builtin.set_fact:
        missing_leantime_smtp_keys: >-
          {{
            required_leantime_smtp_keys |
            difference((platform_email.leantime | default({})).keys() | list)
          }}
      when: platform_email.leantime.use_smtp | default(false) | bool
      tags: [always]

    - name: Fail if required Leantime SMTP settings are missing
      ansible.builtin.fail:
        msg: "platform_email.leantime is missing required SMTP settings: {{ missing_leantime_smtp_keys | join(', ') }}"
      when:
        - platform_email.leantime.use_smtp | default(false) | bool
        - missing_leantime_smtp_keys | default([]) | length > 0
      tags: [always]

    - name: Fail if required Leantime SMTP settings are empty or placeholders
      ansible.builtin.fail:
        msg: "platform_email.leantime.{{ item }} is empty or still set to a placeholder value."
      vars:
        smtp_value: "{{ platform_email.leantime[item] | default('') | string }}"
        normalized_smtp_value: "{{ smtp_value | trim | lower }}"
      loop: "{{ required_leantime_smtp_keys | default([]) }}"
      when: >
        (platform_email.leantime.use_smtp | default(false) | bool) and
        (
          (smtp_value | trim | length == 0) or
          (normalized_smtp_value in production_placeholder_values) or
          (normalized_smtp_value is match('^(change[_-]?me|replace[_-]?me|todo|example|your[_ -]?value|your[_ -]?secret)'))
        )
      tags: [always]

    - name: Fail if Leantime SMTP port is not numeric
      ansible.builtin.fail:
        msg: "platform_email.leantime.smtp_port must be a numeric port."
      vars:
        leantime_smtp_port: "{{ platform_email.leantime.smtp_port | default('') | string | trim }}"
      when:
        - platform_email.leantime.use_smtp | default(false) | bool
        - not (leantime_smtp_port is match('^[0-9]+$'))
      tags: [always]

    - name: Fail if Leantime SMTP return address includes a display name
      ansible.builtin.fail:
        msg: "platform_email.leantime.return must be a plain email address, not a display-name value like 'Leantime <noreply@example.com>'."
      vars:
        leantime_email_return: "{{ platform_email.leantime.return | default('') | string | trim }}"
      when:
        - platform_email.leantime.use_smtp | default(false) | bool
        - leantime_email_return is search('[<>]')
      tags: [always]

    - name: Define required WiseMapping SMTP settings
      ansible.builtin.set_fact:
        required_wisemapping_smtp_keys:
          - sender_email
          - smtp_host
          - smtp_port
          - smtp_username
          - smtp_password
      when: (platform_email.wisemapping | default({})).use_smtp | default(false) | bool
      tags: [always]

    - name: Detect missing required WiseMapping SMTP settings
      ansible.builtin.set_fact:
        missing_wisemapping_smtp_keys: >-
          {{
            required_wisemapping_smtp_keys |
            difference((platform_email.wisemapping | default({})).keys() | list)
          }}
      when: (platform_email.wisemapping | default({})).use_smtp | default(false) | bool
      tags: [always]

    - name: Fail if required WiseMapping SMTP settings are missing
      ansible.builtin.fail:
        msg: "platform_email.wisemapping is missing required SMTP settings: {{ missing_wisemapping_smtp_keys | join(', ') }}"
      when:
        - (platform_email.wisemapping | default({})).use_smtp | default(false) | bool
        - missing_wisemapping_smtp_keys | default([]) | length > 0
      tags: [always]

    - name: Fail if required WiseMapping SMTP settings are empty or placeholders
      ansible.builtin.fail:
        msg: "platform_email.wisemapping.{{ item }} is empty or still set to a placeholder value."
      vars:
        smtp_value: "{{ (platform_email.wisemapping | default({}))[item] | default('') | string }}"
        normalized_smtp_value: "{{ smtp_value | trim | lower }}"
      loop: "{{ required_wisemapping_smtp_keys | default([]) }}"
      when: >
        ((platform_email.wisemapping | default({})).use_smtp | default(false) | bool) and
        (
          (smtp_value | trim | length == 0) or
          (normalized_smtp_value in production_placeholder_values) or
          (normalized_smtp_value is match('^(change[_-]?me|replace[_-]?me|todo|example|your[_ -]?value|your[_ -]?secret)'))
        )
      tags: [always]

    - name: Fail if WiseMapping SMTP port is not numeric
      ansible.builtin.fail:
        msg: "platform_email.wisemapping.smtp_port must be a numeric port."
      vars:
        wisemapping_smtp_port: "{{ (platform_email.wisemapping | default({})).smtp_port | default('') | string | trim }}"
      when:
        - (platform_email.wisemapping | default({})).use_smtp | default(false) | bool
        - not (wisemapping_smtp_port is match('^[0-9]+$'))
      tags: [always]

    - name: Fail if WiseMapping sender address includes a display name
      ansible.builtin.fail:
        msg: "platform_email.wisemapping.sender_email must be a plain email address, not a display-name value like 'WiseMapping <noreply@example.com>'."
      vars:
        wisemapping_sender_email: "{{ (platform_email.wisemapping | default({})).sender_email | default('') | string | trim }}"
      when:
        - (platform_email.wisemapping | default({})).use_smtp | default(false) | bool
        - wisemapping_sender_email is search('[<>]')
      tags: [always]

    - name: Fail if direct origin URLs are missing while external HTTPS is required
      ansible.builtin.fail:
        msg: "direct_http_urls must be configured when require_external_https is true."
      when:
        - require_external_https | default(true) | bool
        - direct_http_urls | default([]) | length == 0
      tags: [always]

    - name: Check GitOps SSH private key path
      ansible.builtin.stat:
        path: "{{ gitops_repo_ssh_private_key_path }}"
      register: gitops_repo_ssh_key_path_stat
      when:
        - gitops_repo_private | default(false) | bool
        - gitops_repo_ssh_private_key_path | default('') | string | trim | length > 0
      delegate_to: localhost
      become: false
      tags: [always]

    - name: Fail if configured GitOps SSH private key path is missing
      ansible.builtin.fail:
        msg: "gitops_repo_ssh_private_key_path is configured but does not exist: {{ gitops_repo_ssh_private_key_path }}"
      when:
        - gitops_repo_private | default(false) | bool
        - gitops_repo_ssh_private_key_path | default('') | string | trim | length > 0
        - not gitops_repo_ssh_key_path_stat.stat.exists
      delegate_to: localhost
      become: false
      tags: [always]

    - name: Fail if private GitOps repository credentials are missing
      ansible.builtin.fail:
        msg: "gitops_repo_private is true, but no Argo CD repository credentials were provided."
      when:
        - gitops_repo_private | default(false) | bool
        - not (
            (gitops_repo_ssh_private_key | default('') | string | trim | length > 0) or
            (gitops_repo_ssh_private_key_path | default('') | string | trim | length > 0) or
            (
              (gitops_repo_username | default('') | string | trim | length > 0) and
              (gitops_repo_password | default('') | string | trim | length > 0)
            )
          )
      delegate_to: localhost
      become: false
      tags: [always]

  roles:
    - role: k3s_host
      tags: [k3s]
    - role: platform_gitops
      tags: [platform, gitops]
    - role: platform_validation
      tags: [platform, validation]
