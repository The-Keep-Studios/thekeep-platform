- name: Create local temporary GitOps render directory
  ansible.builtin.tempfile:
    state: directory
    suffix: gitops-render
  register: gitops_render_dir
  delegate_to: localhost
  become: false

- name: Create local temporary GitOps render subdirectories
  ansible.builtin.file:
    path: "{{ gitops_render_dir.path }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - root
    - apps
  delegate_to: localhost
  become: false

- name: Render GitOps manifests to temporary directory
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ gitops_render_dir.path }}/{{ item.dest }}"
    mode: "0644"
  loop:
    - src: "{{ playbook_dir }}/../kubernetes/gitops/templates/platform-project.yaml"
      dest: root/platform-project.yaml
    - src: "{{ playbook_dir }}/../kubernetes/gitops/templates/platform-root.application.yaml"
      dest: root/platform-root.application.yaml
    - src: "{{ playbook_dir }}/../kubernetes/gitops/templates/platform-applications.yaml"
      dest: apps/platform-applications.yaml
  delegate_to: localhost
  become: false

- name: Verify no placeholders remain in rendered or committed GitOps manifests
  ansible.builtin.command:
    argv:
      - grep
      - -R
      - REPLACE_ME_GITOPS_
      - "{{ gitops_render_dir.path }}/root"
      - "{{ gitops_render_dir.path }}/apps"
      - "{{ playbook_dir }}/../kubernetes/gitops/root"
      - "{{ playbook_dir }}/../kubernetes/gitops/apps"
  register: gitops_placeholder_check
  failed_when: gitops_placeholder_check.rc == 0 or gitops_placeholder_check.rc > 1
  changed_when: false
  delegate_to: localhost
  become: false

- name: Verify committed GitOps manifests match rendered templates
  ansible.builtin.command:
    argv:
      - diff
      - -ruN
      - "{{ playbook_dir }}/../{{ item.committed }}"
      - "{{ gitops_render_dir.path }}/{{ item.rendered }}"
  loop:
    - committed: kubernetes/gitops/root
      rendered: root
    - committed: kubernetes/gitops/apps
      rendered: apps
  register: gitops_render_diff
  failed_when: gitops_render_diff.rc != 0
  changed_when: false
  delegate_to: localhost
  become: false

- name: Check GitOps manifests have no unstaged changes
  ansible.builtin.command:
    argv:
      - git
      - diff
      - --exit-code
      - --
      - kubernetes/gitops/root
      - kubernetes/gitops/apps
  args:
    chdir: "{{ playbook_dir }}/.."
  register: gitops_unstaged_check
  failed_when: gitops_unstaged_check.rc != 0
  changed_when: false
  delegate_to: localhost
  become: false
  tags: [gitops_check]

- name: Check GitOps manifests have no staged changes
  ansible.builtin.command:
    argv:
      - git
      - diff
      - --cached
      - --exit-code
      - --
      - kubernetes/gitops/root
      - kubernetes/gitops/apps
  args:
    chdir: "{{ playbook_dir }}/.."
  register: gitops_staged_check
  failed_when: gitops_staged_check.rc != 0
  changed_when: false
  delegate_to: localhost
  become: false
  tags: [gitops_check]

- name: Check GitOps manifests have no untracked files
  ansible.builtin.command:
    argv:
      - git
      - ls-files
      - --others
      - --exclude-standard
      - --
      - kubernetes/gitops/root
      - kubernetes/gitops/apps
  args:
    chdir: "{{ playbook_dir }}/.."
  register: gitops_untracked_check
  failed_when: gitops_untracked_check.stdout | trim | length > 0
  changed_when: false
  delegate_to: localhost
  become: false
  tags: [gitops_check]

- name: Read local Git HEAD
  ansible.builtin.command:
    argv:
      - git
      - rev-parse
      - HEAD
  args:
    chdir: "{{ playbook_dir }}/.."
  register: gitops_local_head
  changed_when: false
  delegate_to: localhost
  become: false
  tags: [gitops_check]

- name: Read configured GitOps remote revision
  ansible.builtin.command:
    argv:
      - git
      - ls-remote
      - "{{ gitops_repo_url }}"
      - "{{ gitops_revision }}"
      - "refs/heads/{{ gitops_revision }}"
      - "refs/tags/{{ gitops_revision }}"
      - "refs/tags/{{ gitops_revision }}^{}"
  register: gitops_remote_target_refs
  changed_when: false
  delegate_to: localhost
  become: false
  tags: [gitops_check]

- name: Read remote refs for explicit GitOps commit revision
  ansible.builtin.command:
    argv:
      - git
      - ls-remote
      - "{{ gitops_repo_url }}"
  register: gitops_remote_all_refs
  changed_when: false
  when: gitops_revision is match('^[0-9a-fA-F]{40}$')
  delegate_to: localhost
  become: false
  tags: [gitops_check]

- name: Parse configured GitOps remote revision SHAs
  ansible.builtin.set_fact:
    gitops_revision_is_explicit_sha: "{{ gitops_revision is match('^[0-9a-fA-F]{40}$') }}"
    gitops_remote_target_shas: "{{ gitops_remote_target_refs.stdout_lines | map('regex_replace', '\\s.*$', '') | list }}"
    gitops_remote_all_shas: "{{ (gitops_remote_all_refs.stdout_lines | default([])) | map('regex_replace', '\\s.*$', '') | list }}"
  tags: [gitops_check]

- name: Fail if configured GitOps branch or tag does not exist remotely
  ansible.builtin.fail:
    msg: "gitops_revision={{ gitops_revision }} was not found in gitops_repo_url={{ gitops_repo_url }}."
  when:
    - not (gitops_revision_is_explicit_sha | bool)
    - gitops_remote_target_shas | length == 0
  delegate_to: localhost
  become: false
  tags: [gitops_check]

- name: Fail if local HEAD is not the configured GitOps commit SHA
  ansible.builtin.fail:
    msg: "Local HEAD {{ gitops_local_head.stdout }} does not match gitops_revision {{ gitops_revision }}."
  when:
    - gitops_revision_is_explicit_sha | bool
    - gitops_local_head.stdout | lower != gitops_revision | lower
  delegate_to: localhost
  become: false
  tags: [gitops_check]

- name: Fail if local HEAD is not pushed to the configured GitOps branch or tag
  ansible.builtin.fail:
    msg: "Local HEAD {{ gitops_local_head.stdout }} does not match remote gitops_revision={{ gitops_revision }} at {{ gitops_repo_url }}."
  when:
    - not (gitops_revision_is_explicit_sha | bool)
    - gitops_local_head.stdout not in gitops_remote_target_shas
  delegate_to: localhost
  become: false
  tags: [gitops_check]

- name: Fail if configured GitOps commit SHA is not advertised by remote
  ansible.builtin.fail:
    msg: "gitops_revision {{ gitops_revision }} is not advertised by any remote ref in {{ gitops_repo_url }}."
  when:
    - gitops_revision_is_explicit_sha | bool
    - gitops_local_head.stdout not in gitops_remote_all_shas
  delegate_to: localhost
  become: false
  tags: [gitops_check]

- name: Define kubectl execution context
  ansible.builtin.set_fact:
    platform_kubectl: /usr/local/bin/kubectl
    platform_kubectl_env:
      KUBECONFIG: /home/k3s-admin/.kube/config

- name: Ensure required namespaces exist
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - apply
      - -f
      - "-"
  args:
    stdin: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: {{ item }}
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  loop:
    - identity
    - wisemapping
    - monitoring
    - argocd
  changed_when: >
    namespace_apply.stdout is defined and
    ('created' in namespace_apply.stdout or 'configured' in namespace_apply.stdout)
  register: namespace_apply

- name: Apply platform secrets
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - apply
      - -f
      - "-"
  args:
    stdin: >-
      {{
        {
          'apiVersion': 'v1',
          'kind': 'Secret',
          'metadata': {
            'name': item.name,
            'namespace': item.namespace
          },
          'type': item.type | default('Opaque'),
          'stringData': item.data
        } | to_nice_yaml
      }}
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  no_log: true
  loop:
    - name: authentik-secrets
      namespace: identity
      data:
        AUTHENTIK_SECRET_KEY: "{{ platform_secrets.authentik_secret_key }}"
        AUTHENTIK_POSTGRES_PASSWORD: "{{ platform_secrets.authentik_postgres_password }}"
        AUTHENTIK_BOOTSTRAP_EMAIL: "{{ platform_secrets.authentik_bootstrap_email }}"
        AUTHENTIK_BOOTSTRAP_PASSWORD: "{{ platform_secrets.authentik_bootstrap_password }}"
    - name: leantime-db
      namespace: default
      data:
        MYSQL_ROOT_PASSWORD: "{{ platform_secrets.leantime_db_root_password }}"
        MYSQL_PASSWORD: "{{ platform_secrets.leantime_db_password }}"
    - name: leantime-oidc
      namespace: default
      data:
        LEAN_OIDC_ENABLE: "{{ platform_oidc.leantime.enable | string }}"
        LEAN_OIDC_CLIENT_ID: "{{ platform_oidc.leantime.client_id | default('') }}"
        LEAN_OIDC_CLIENT_SECRET: "{{ platform_oidc.leantime.client_secret | default('') }}"
        LEAN_OIDC_PROVIDER_URL: "{{ platform_oidc.leantime.provider_url | default('') }}"
        LEAN_OIDC_CREATE_USER: "{{ platform_oidc.leantime.create_user | default(true) | string }}"
        LEAN_OIDC_DEFAULT_ROLE: "{{ platform_oidc.leantime.default_role | default(20) | string }}"
        LEAN_OIDC_SCOPES: "{{ platform_oidc.leantime.scopes | default('openid,profile,email') }}"
        LEAN_DISABLE_LOGIN_FORM: "{{ platform_oidc.leantime.disable_login_form | default(false) | string }}"
    - name: leantime-email
      namespace: default
      data:
        LEAN_EMAIL_RETURN: "{{ platform_email.leantime.return | default('') }}"
        LEAN_EMAIL_USE_SMTP: "{{ (platform_email.leantime.use_smtp | default(false) | bool) | string | lower }}"
        LEAN_EMAIL_SMTP_HOSTS: "{{ platform_email.leantime.smtp_hosts | default('') }}"
        LEAN_EMAIL_SMTP_AUTH: "{{ (platform_email.leantime.smtp_auth | default(true) | bool) | string | lower }}"
        LEAN_EMAIL_SMTP_USERNAME: "{{ platform_email.leantime.smtp_username | default('') }}"
        LEAN_EMAIL_SMTP_PASSWORD: "{{ platform_email.leantime.smtp_password | default('') }}"
        LEAN_EMAIL_SMTP_AUTO_TLS: "{{ (platform_email.leantime.smtp_auto_tls | default(true) | bool) | string | lower }}"
        LEAN_EMAIL_SMTP_SECURE: "{{ platform_email.leantime.smtp_secure | default('') }}"
        LEAN_EMAIL_SMTP_SSLNOVERIFY: "{{ (platform_email.leantime.smtp_ssl_noverify | default(false) | bool) | string | lower }}"
        LEAN_EMAIL_SMTP_PORT: "{{ platform_email.leantime.smtp_port | default('') }}"
    - name: wisemapping-secrets
      namespace: wisemapping
      data:
        WISEMAPPING_POSTGRES_PASSWORD: "{{ platform_secrets.wisemapping_postgres_password }}"
        WISEMAPPING_JWT_SECRET: "{{ platform_secrets.wisemapping_jwt_secret }}"
        WISEMAPPING_OAUTH_TOKEN_SECRET: "{{ platform_secrets.wisemapping_oauth_token_secret }}"
        WISEMAPPING_OAUTH_ENABLED: "{{ (platform_oidc.wisemapping.enable | default(false) | bool) | string | lower }}"
        SPRING_PROFILES_ACTIVE: "{{ 'oidc' if (platform_oidc.wisemapping.enable | default(false) | bool) else '' }}"
        OAUTH_GOOGLE_CLIENT_ID: "{{ platform_oidc.wisemapping.google_client_id | default('') }}"
        OAUTH_GOOGLE_CLIENT_SECRET: "{{ platform_oidc.wisemapping.google_client_secret | default('') }}"
        OAUTH_GOOGLE_ISSUER_URI: "{{ platform_oidc.wisemapping.google_issuer_uri | default('') }}"
    - name: wisemapping-email
      namespace: wisemapping
      data:
        WISEMAPPING_MAIL_ENABLED: "{{ ((platform_email.wisemapping | default({})).use_smtp | default(false) | bool) | string | lower }}"
        WISEMAPPING_MAIL_SENDER_EMAIL: "{{ (platform_email.wisemapping | default({})).sender_email | default('') }}"
        WISEMAPPING_MAIL_HOST: "{{ (platform_email.wisemapping | default({})).smtp_host | default('') }}"
        WISEMAPPING_MAIL_PORT: "{{ (platform_email.wisemapping | default({})).smtp_port | default('587') | string }}"
        WISEMAPPING_MAIL_USERNAME: "{{ (platform_email.wisemapping | default({})).smtp_username | default('') }}"
        WISEMAPPING_MAIL_PASSWORD: "{{ (platform_email.wisemapping | default({})).smtp_password | default('') }}"
    - name: monitoring-basic-auth
      namespace: monitoring
      type: kubernetes.io/basic-auth
      data:
        username: "{{ platform_secrets.monitoring_basic_auth_user | default(platform_secrets.grafana_admin_user) }}"
        password: "{{ platform_secrets.monitoring_basic_auth_password | default(platform_secrets.grafana_admin_password) }}"
    - name: cloudflare-tunnel-token
      namespace: kube-system
      data:
        token: "{{ platform_secrets.cloudflare_tunnel_token }}"

- name: Apply Grafana admin secret
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - apply
      - -f
      - "-"
  args:
    stdin: >-
      {{
        {
          'apiVersion': 'v1',
          'kind': 'Secret',
          'metadata': {
            'name': 'grafana-admin',
            'namespace': 'monitoring'
          },
          'type': 'Opaque',
          'stringData': {
            'admin-user': platform_secrets.grafana_admin_user,
            'admin-password': platform_secrets.grafana_admin_password
          }
        } | to_nice_yaml
      }}
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  no_log: true
  when: monitoring_enabled | default(true) | bool

- name: Create remote temporary Argo CD kustomize directory
  ansible.builtin.tempfile:
    state: directory
    suffix: argocd-kustomize
  register: argocd_kustomize_dir

- name: Copy Argo CD kustomize inputs to remote host
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../kubernetes/platform/argocd/"
    dest: "{{ argocd_kustomize_dir.path }}/"
    mode: preserve

- name: Render Argo CD manifests with kustomize
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - kustomize
      - "{{ argocd_kustomize_dir.path }}"
  register: argocd_kustomize_manifest
  changed_when: false

- name: Install Argo CD via Kustomize
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - apply
      - "--server-side"
      - "--force-conflicts"
      - -f
      - "-"
  args:
    stdin: "{{ argocd_kustomize_manifest.stdout }}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"

- name: Remove remote temporary Argo CD kustomize directory
  ansible.builtin.file:
    path: "{{ argocd_kustomize_dir.path }}"
    state: absent

- name: Build Argo CD GitOps repository credential from inline SSH key
  ansible.builtin.set_fact:
    gitops_argocd_repository_secret_string_data:
      type: git
      url: "{{ gitops_repo_url }}"
      sshPrivateKey: "{{ gitops_repo_ssh_private_key }}"
  when:
    - gitops_repo_private | default(false) | bool
    - gitops_repo_ssh_private_key | default('') | string | trim | length > 0
  no_log: true

- name: Build Argo CD GitOps repository credential from SSH key path
  ansible.builtin.set_fact:
    gitops_argocd_repository_secret_string_data:
      type: git
      url: "{{ gitops_repo_url }}"
      sshPrivateKey: "{{ lookup('ansible.builtin.file', gitops_repo_ssh_private_key_path) }}"
  when:
    - gitops_repo_private | default(false) | bool
    - gitops_argocd_repository_secret_string_data is not defined
    - gitops_repo_ssh_private_key_path | default('') | string | trim | length > 0
  no_log: true

- name: Build Argo CD GitOps repository credential from username and password
  ansible.builtin.set_fact:
    gitops_argocd_repository_secret_string_data:
      type: git
      url: "{{ gitops_repo_url }}"
      username: "{{ gitops_repo_username }}"
      password: "{{ gitops_repo_password }}"
  when:
    - gitops_repo_private | default(false) | bool
    - gitops_argocd_repository_secret_string_data is not defined
    - gitops_repo_username | default('') | string | trim | length > 0
    - gitops_repo_password | default('') | string | trim | length > 0
  no_log: true

- name: Fail if private GitOps repository credential data was not built
  ansible.builtin.fail:
    msg: "gitops_repo_private is true, but no usable Argo CD repository credential data was built."
  when:
    - gitops_repo_private | default(false) | bool
    - gitops_argocd_repository_secret_string_data is not defined

- name: Apply Argo CD GitOps repository credentials
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - apply
      - -f
      - "-"
  args:
    stdin: >-
      {{
        {
          'apiVersion': 'v1',
          'kind': 'Secret',
          'metadata': {
            'name': 'platform-gitops-repository',
            'namespace': 'argocd',
            'labels': {
              'argocd.argoproj.io/secret-type': 'repository'
            }
          },
          'type': 'Opaque',
          'stringData': gitops_argocd_repository_secret_string_data
        } | to_nice_yaml
      }}
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  no_log: true
  when: gitops_repo_private | default(false) | bool

- name: Wait for Argo CD server to be available
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - wait
      - --for=condition=available
      - --timeout=300s
      - deployment/argocd-server
      - -n
      - argocd
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  changed_when: false

- name: Apply GitOps AppProject
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - apply
      - -f
      - "-"
  args:
    stdin: "{{ lookup('ansible.builtin.file', playbook_dir + '/../kubernetes/gitops/root/platform-project.yaml') }}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"

- name: Apply GitOps Applications
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - apply
      - -f
      - "-"
  args:
    stdin: "{{ lookup('ansible.builtin.file', playbook_dir + '/../' + item) }}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  loop:
    - kubernetes/gitops/apps/platform-applications.yaml
    - kubernetes/gitops/root/platform-root.application.yaml

- name: Wait for root application to reconcile
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - application
      - platform-root
      - -n
      - argocd
      - -o
      - "jsonpath={.status.sync.status} {.status.health.status}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: root_app
  until: root_app.stdout | trim == 'Synced Healthy'
  retries: 90
  delay: 10
  changed_when: false

- name: Define Leantime email configuration hash
  ansible.builtin.set_fact:
    leantime_email_config_hash: >-
      {{
        {
          'return': platform_email.leantime.return | default(''),
          'use_smtp': platform_email.leantime.use_smtp | default(false) | bool,
          'smtp_hosts': platform_email.leantime.smtp_hosts | default(''),
          'smtp_auth': platform_email.leantime.smtp_auth | default(true) | bool,
          'smtp_username': platform_email.leantime.smtp_username | default(''),
          'smtp_password': platform_email.leantime.smtp_password | default(''),
          'smtp_auto_tls': platform_email.leantime.smtp_auto_tls | default(true) | bool,
          'smtp_secure': platform_email.leantime.smtp_secure | default(''),
          'smtp_ssl_noverify': platform_email.leantime.smtp_ssl_noverify | default(false) | bool,
          'smtp_port': platform_email.leantime.smtp_port | default('')
        } | to_json | hash('sha256')
      }}
  no_log: true
  when: platform_email.leantime.use_smtp | default(false) | bool

- name: Read applied Leantime email configuration hash
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - configmap
      - leantime-email-config-state
      - -n
      - default
      - -o
      - "jsonpath={.data.hash}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: leantime_email_config_state
  changed_when: false
  failed_when: false
  when: platform_email.leantime.use_smtp | default(false) | bool

- name: Restart Leantime pods after email configuration changes
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - delete
      - pod
      - -l
      - app=leantime
      - -n
      - default
      - --ignore-not-found=true
      - --wait=false
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  when:
    - platform_email.leantime.use_smtp | default(false) | bool
    - leantime_email_config_state.stdout | default('') | trim != leantime_email_config_hash

- name: Persist Leantime email configuration hash
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - apply
      - -f
      - "-"
  args:
    stdin: >-
      {{
        {
          'apiVersion': 'v1',
          'kind': 'ConfigMap',
          'metadata': {
            'name': 'leantime-email-config-state',
            'namespace': 'default'
          },
          'data': {
            'hash': leantime_email_config_hash
          }
        } | to_nice_yaml
      }}
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  when:
    - platform_email.leantime.use_smtp | default(false) | bool
    - leantime_email_config_state.stdout | default('') | trim != leantime_email_config_hash

- name: Wait for Leantime after email configuration changes
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - rollout
      - status
      - deployment/leantime
      - -n
      - default
      - --timeout=180s
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  changed_when: false
  when:
    - platform_email.leantime.use_smtp | default(false) | bool
    - leantime_email_config_state.stdout | default('') | trim != leantime_email_config_hash

- name: Define WiseMapping email configuration hash
  ansible.builtin.set_fact:
    wisemapping_email_config_hash: >-
      {{
        {
          'use_smtp': (platform_email.wisemapping | default({})).use_smtp | default(false) | bool,
          'sender_email': (platform_email.wisemapping | default({})).sender_email | default(''),
          'smtp_host': (platform_email.wisemapping | default({})).smtp_host | default(''),
          'smtp_port': (platform_email.wisemapping | default({})).smtp_port | default('587') | string,
          'smtp_username': (platform_email.wisemapping | default({})).smtp_username | default(''),
          'smtp_password': (platform_email.wisemapping | default({})).smtp_password | default('')
        } | to_json | hash('sha256')
      }}
  no_log: true
  when: (platform_email.wisemapping | default({})).use_smtp | default(false) | bool

- name: Read applied WiseMapping email configuration hash
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - configmap
      - wisemapping-email-config-state
      - -n
      - wisemapping
      - -o
      - "jsonpath={.data.hash}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: wisemapping_email_config_state
  changed_when: false
  failed_when: false
  when: (platform_email.wisemapping | default({})).use_smtp | default(false) | bool

- name: Restart WiseMapping pods after email configuration changes
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - delete
      - pod
      - -l
      - app=wisemapping
      - -n
      - wisemapping
      - --ignore-not-found=true
      - --wait=false
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  when:
    - (platform_email.wisemapping | default({})).use_smtp | default(false) | bool
    - wisemapping_email_config_state.stdout | default('') | trim != wisemapping_email_config_hash

- name: Persist WiseMapping email configuration hash
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - apply
      - -f
      - "-"
  args:
    stdin: >-
      {{
        {
          'apiVersion': 'v1',
          'kind': 'ConfigMap',
          'metadata': {
            'name': 'wisemapping-email-config-state',
            'namespace': 'wisemapping'
          },
          'data': {
            'hash': wisemapping_email_config_hash
          }
        } | to_nice_yaml
      }}
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  when:
    - (platform_email.wisemapping | default({})).use_smtp | default(false) | bool
    - wisemapping_email_config_state.stdout | default('') | trim != wisemapping_email_config_hash

- name: Wait for WiseMapping after email configuration changes
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - rollout
      - status
      - deployment/wisemapping
      - -n
      - wisemapping
      - --timeout=180s
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  changed_when: false
  when:
    - (platform_email.wisemapping | default({})).use_smtp | default(false) | bool
    - wisemapping_email_config_state.stdout | default('') | trim != wisemapping_email_config_hash
