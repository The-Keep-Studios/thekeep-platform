- name: Check Kubernetes API connectivity
  kubernetes.core.k8s_info:
    kind: Node
    kubeconfig: /home/k3s-admin/.kube/config
  become: true
  become_user: k3s-admin
  register: cluster_nodes
  failed_when: cluster_nodes.resources | length == 0

- name: Check Argo application status
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ item }}"
    namespace: argocd
    kubeconfig: /home/k3s-admin/.kube/config
  become: true
  become_user: k3s-admin
  loop:
    - platform-root
    - platform-cloudflare-tunnel
    - platform-authentik
    - platform-leantime
    - platform-wisemapping
    - platform-monitoring-prometheus
    - platform-monitoring-loki
  register: app_info
  failed_when: false

- name: Fail if any Argo application is missing or unhealthy
  ansible.builtin.fail:
    msg: >-
      Argo application {{ item.item }} is not ready
      (sync={{ (item.resources[0].status.sync.status if item.resources | length > 0 else 'missing') | default('unknown') }},
      health={{ (item.resources[0].status.health.status if item.resources | length > 0 else 'missing') | default('unknown') }}).
  loop: "{{ app_info.results }}"
  when: >
    (item.resources | length == 0) or
    (item.resources[0].status.sync.status | default('') != 'Synced') or
    (item.resources[0].status.health.status | default('') != 'Healthy')

- name: Check Cloudflare tunnel deployment
  kubernetes.core.k8s_info:
    kind: Deployment
    name: cloudflared
    namespace: kube-system
    kubeconfig: /home/k3s-admin/.kube/config
  become: true
  become_user: k3s-admin
  register: cf_deploy
  failed_when: >
    (cf_deploy.resources | length == 0) or
    (cf_deploy.resources[0].status.availableReplicas | default(0) == 0)

- name: Check Leantime backup CronJob
  kubernetes.core.k8s_info:
    kind: CronJob
    name: leantime-db-backup
    namespace: default
    kubeconfig: /home/k3s-admin/.kube/config
  become: true
  become_user: k3s-admin
  register: backup_cron
  failed_when: backup_cron.resources | length == 0

- name: Verify Leantime backup alert is reconciled
  kubernetes.core.k8s_info:
    api_version: monitoring.coreos.com/v1
    kind: PrometheusRule
    namespace: monitoring
    kubeconfig: /home/k3s-admin/.kube/config
  become: true
  become_user: k3s-admin
  register: prometheus_rules
  failed_when: >
    monitoring_enabled | default(true) | bool and
    (
      (prometheus_rules.resources | length == 0) or
      (not ((prometheus_rules.resources | to_json) is search('LeantimeBackupFailed')))
    )
  when: monitoring_enabled | default(true) | bool

- name: Read Leantime backup validation timestamp
  ansible.builtin.command:
    argv:
      - date
      - +%s
  register: leantime_backup_validation_timestamp
  changed_when: false

- name: Set Leantime backup validation names
  ansible.builtin.set_fact:
    leantime_backup_validation_min_epoch: "{{ leantime_backup_validation_timestamp.stdout }}"
    leantime_backup_validation_job_name: "leantime-db-backup-validation-{{ leantime_backup_validation_timestamp.stdout }}"
    leantime_backup_validator_pod_name: "leantime-backup-artifact-validation-{{ leantime_backup_validation_timestamp.stdout }}"

- name: Trigger one-time Leantime backup Job
  ansible.builtin.command:
    argv:
      - /usr/local/bin/kubectl
      - create
      - job
      - "{{ leantime_backup_validation_job_name }}"
      - --from=cronjob/leantime-db-backup
      - -n
      - default
  environment:
    KUBECONFIG: /home/k3s-admin/.kube/config
  become: true
  become_user: k3s-admin
  register: leantime_backup_validation_job
  changed_when: true

- name: Wait for one-time Leantime backup Job to complete
  ansible.builtin.command:
    argv:
      - /usr/local/bin/kubectl
      - wait
      - --for=condition=complete
      - --timeout=300s
      - "job/{{ leantime_backup_validation_job_name }}"
      - -n
      - default
  environment:
    KUBECONFIG: /home/k3s-admin/.kube/config
  become: true
  become_user: k3s-admin
  changed_when: false

- name: Create Leantime backup artifact validator pod
  kubernetes.core.k8s:
    state: present
    kubeconfig: /home/k3s-admin/.kube/config
    definition:
      apiVersion: v1
      kind: Pod
      metadata:
        name: "{{ leantime_backup_validator_pod_name }}"
        namespace: default
      spec:
        restartPolicy: Never
        containers:
          - name: validator
            image: mariadb:11.8.6-ubi9
            imagePullPolicy: IfNotPresent
            command:
              - sh
              - -ceu
              - |
                latest="$(ls -t /backup/leantime_*.sql.gz 2>/dev/null | head -n 1)"
                test -n "${latest}"
                test -s "${latest}"
                file_epoch="$(stat -c %Y "${latest}")"
                test "${file_epoch}" -ge "{{ leantime_backup_validation_min_epoch }}"
                gzip -t "${latest}"
                echo "validated ${latest}"
            volumeMounts:
              - name: backup-data
                mountPath: /backup
        volumes:
          - name: backup-data
            persistentVolumeClaim:
              claimName: leantime-backup-pvc
  become: true
  become_user: k3s-admin

- name: Wait for Leantime backup artifact validator pod
  kubernetes.core.k8s_info:
    kind: Pod
    name: "{{ leantime_backup_validator_pod_name }}"
    namespace: default
    kubeconfig: /home/k3s-admin/.kube/config
  become: true
  become_user: k3s-admin
  register: leantime_backup_validator_pod
  until: >
    leantime_backup_validator_pod.resources | length > 0 and
    leantime_backup_validator_pod.resources[0].status.phase | default('') in ['Succeeded', 'Failed']
  retries: 60
  delay: 5
  failed_when: false

- name: Read Leantime backup artifact validation log
  ansible.builtin.command:
    argv:
      - /usr/local/bin/kubectl
      - logs
      - "pod/{{ leantime_backup_validator_pod_name }}"
      - -n
      - default
  environment:
    KUBECONFIG: /home/k3s-admin/.kube/config
  become: true
  become_user: k3s-admin
  register: leantime_backup_validator_log
  changed_when: false
  failed_when: false

- name: Fail if Leantime backup artifact validation failed
  ansible.builtin.fail:
    msg: >-
      Leantime backup artifact validation failed
      (phase={{ leantime_backup_validator_pod.resources[0].status.phase | default('unknown') }}):
      {{ leantime_backup_validator_log.stdout | default(leantime_backup_validator_log.stderr) }}
  when: >
    (leantime_backup_validator_pod.resources | length == 0) or
    (leantime_backup_validator_pod.resources[0].status.phase | default('') != 'Succeeded')

- name: Report Leantime backup artifact validation evidence
  ansible.builtin.debug:
    msg: "{{ leantime_backup_validator_log.stdout }}"

- name: Remove Leantime backup artifact validator pod
  kubernetes.core.k8s:
    state: absent
    kind: Pod
    name: "{{ leantime_backup_validator_pod_name }}"
    namespace: default
    kubeconfig: /home/k3s-admin/.kube/config
  become: true
  become_user: k3s-admin

- name: Verify HTTPS endpoints
  ansible.builtin.uri:
    url: "{{ item }}"
    status_code: [200, 401, 403]
    timeout: 15
  loop:
    - https://auth.thekeepstudios.com
    - https://projects.thekeepstudios.com
    - https://mindmaps.thekeepstudios.com
    - https://grafana.thekeepstudios.com
    - https://prometheus.thekeepstudios.com
    - https://alerts.thekeepstudios.com
    - https://argocd.thekeepstudios.com
  when: require_external_https | default(true) | bool

- name: Verify protected endpoints require authentication
  ansible.builtin.uri:
    url: "{{ item }}"
    status_code: [401, 403]
    timeout: 15
    follow_redirects: all
  loop:
    - https://prometheus.thekeepstudios.com
    - https://alerts.thekeepstudios.com
  when: require_external_https | default(true) | bool

- name: Ensure direct_http_urls is not empty when HTTPS is required
  ansible.builtin.fail:
    msg: "direct_http_urls must be provided when require_external_https is enabled."
  when:
    - require_external_https | default(true) | bool
    - direct_http_urls | default([]) | length == 0

- name: Probe direct HTTP origins
  ansible.builtin.command:
    argv:
      - curl
      - -sS
      - --max-time
      - "10"
      - -o
      - /dev/null
      - -w
      - "%{http_code}"
      - "{{ item }}"
  loop: "{{ direct_http_urls | default([]) }}"
  register: direct_http_origin_probes
  changed_when: false
  failed_when: false
  when: require_external_https | default(true) | bool

- name: Fail if any direct HTTP origin answers
  ansible.builtin.fail:
    msg: "Direct HTTP origin answered and must be blocked: {{ item.item }} (HTTP {{ item.stdout | trim }})."
  loop: "{{ direct_http_origin_probes.results | default([]) }}"
  when:
    - require_external_https | default(true) | bool
    - (item.stdout | default('') | trim) not in ['', '000']

- name: Report direct HTTP origin block evidence
  ansible.builtin.debug:
    msg: "Direct HTTP origin blocked: {{ item.item }} (curl_rc={{ item.rc }}, http_code={{ item.stdout | default('000') | trim }})."
  loop: "{{ direct_http_origin_probes.results | default([]) }}"
  when: require_external_https | default(true) | bool
