- name: Define kubectl execution context
  ansible.builtin.set_fact:
    platform_kubectl: /usr/local/bin/kubectl
    platform_kubectl_env:
      KUBECONFIG: /home/k3s-admin/.kube/config
    platform_validation_default_argo_app_statuses:
      - Synced Healthy
    platform_validation_twenty_enabled: "{{ ((platform_optional_apps | default({})).twenty | default({})).enabled | default(false) | bool }}"
    platform_validation_espocrm_enabled: "{{ ((platform_optional_apps | default({})).espocrm | default({})).enabled | default(false) | bool }}"

- name: Check Kubernetes API connectivity
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - nodes
      - -o
      - name
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: cluster_nodes
  changed_when: false
  failed_when: cluster_nodes.rc != 0 or (cluster_nodes.stdout_lines | default([]) | length == 0)

- name: Check Argo application status
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - application
      - "{{ item }}"
      - -n
      - argocd
      - -o
      - "jsonpath={.status.sync.status} {.status.health.status}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  loop:
    - platform-root
    - platform-cloudflare-tunnel
    - platform-authentik
    - platform-leantime
    - platform-wisemapping
    - platform-baserow
    - platform-monitoring-prometheus
    - platform-monitoring-loki
  register: app_status
  until: >
    app_status.rc == 0 and
    (app_status.stdout | default('') | trim) in
    (
      platform_validation_default_argo_app_statuses +
      (platform_validation_argo_app_allowed_statuses[item] | default([]))
    )
  retries: "{{ platform_validation_argo_app_status_retries | default(60) }}"
  delay: "{{ platform_validation_argo_app_status_delay | default(10) }}"
  changed_when: false
  failed_when: false

- name: Fail if any Argo application is missing or unhealthy
  ansible.builtin.fail:
    msg: >-
      Argo application {{ item.item }} is not ready
      (rc={{ item.rc }}, status={{ item.stdout | default('') | trim | default('missing', true) }},
      expected={{ (platform_validation_default_argo_app_statuses + (platform_validation_argo_app_allowed_statuses[item.item] | default([]))) | join(' or ') }},
      stderr={{ item.stderr | default('') | trim | default('none', true) }}).
  loop: "{{ app_status.results }}"
  when: >
    item.rc != 0 or
    (item.stdout | default('') | trim) not in
    (
      platform_validation_default_argo_app_statuses +
      (platform_validation_argo_app_allowed_statuses[item.item] | default([]))
    )

- name: Check optional CRM Argo application status
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - application
      - "{{ item.name }}"
      - -n
      - argocd
      - -o
      - "jsonpath={.status.sync.status} {.status.health.status}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  loop:
    - name: platform-crm-twenty
      enabled: "{{ platform_validation_twenty_enabled }}"
    - name: platform-crm-espocrm
      enabled: "{{ platform_validation_espocrm_enabled }}"
  register: optional_crm_app_status
  until: >
    optional_crm_app_status.rc == 0 and
    (optional_crm_app_status.stdout | default('') | trim) in platform_validation_default_argo_app_statuses
  retries: "{{ platform_validation_argo_app_status_retries | default(60) }}"
  delay: "{{ platform_validation_argo_app_status_delay | default(10) }}"
  changed_when: false
  failed_when: false
  when: item.enabled | bool

- name: Fail if optional CRM Argo application is missing or unhealthy
  ansible.builtin.fail:
    msg: >-
      Argo application {{ item.item.name }} is not ready
      (rc={{ item.rc }}, status={{ item.stdout | default('') | trim | default('missing', true) }},
      expected={{ platform_validation_default_argo_app_statuses | join(' or ') }},
      stderr={{ item.stderr | default('') | trim | default('none', true) }}).
  loop: "{{ optional_crm_app_status.results | default([]) }}"
  when:
    - item.item.enabled | bool
    - >
      item.rc != 0 or
      (item.stdout | default('') | trim) not in platform_validation_default_argo_app_statuses

- name: Check Cloudflare tunnel deployment
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - deployment
      - cloudflared
      - -n
      - kube-system
      - -o
      - "jsonpath={.status.availableReplicas}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: cf_deploy
  changed_when: false
  failed_when: cf_deploy.rc != 0 or (cf_deploy.stdout | default('0') | trim | int) == 0

- name: Check Leantime backup CronJob
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - cronjob
      - leantime-db-backup
      - -n
      - default
      - -o
      - name
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: backup_cron
  changed_when: false
  failed_when: backup_cron.rc != 0 or backup_cron.stdout | default('') | trim | length == 0

- name: Check Baserow backup CronJob
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - cronjob
      - baserow-backup
      - -n
      - baserow
      - -o
      - name
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: baserow_backup_cron
  changed_when: false
  failed_when: baserow_backup_cron.rc != 0 or baserow_backup_cron.stdout | default('') | trim != 'cronjob.batch/baserow-backup'

- name: Verify platform alert rules are reconciled
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - prometheusrules.monitoring.coreos.com
      - -n
      - monitoring
      - -o
      - yaml
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: prometheus_rules
  changed_when: false
  failed_when: >
    prometheus_rules.rc != 0 or
    not (prometheus_rules.stdout is search('LeantimeBackupFailed')) or
    not (prometheus_rules.stdout is search('BaserowBackupFailed')) or
    not (prometheus_rules.stdout is search('WiseMappingBackendUnavailable')) or
    not (prometheus_rules.stdout is search('BaserowUnavailable')) or
    not (prometheus_rules.stdout is search('GrafanaUnavailable')) or
    not (prometheus_rules.stdout is search('LokiUnavailable')) or
    not (prometheus_rules.stdout is search('PromtailUnavailable'))
  when: monitoring_enabled | default(true) | bool

- name: Verify Loki service is reconciled
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - service
      - loki
      - -n
      - monitoring
      - -o
      - name
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: loki_service
  changed_when: false
  failed_when: loki_service.rc != 0 or loki_service.stdout | default('') | trim != 'service/loki'
  when: monitoring_enabled | default(true) | bool

- name: Verify Loki GitOps application uses current chart
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - application
      - platform-monitoring-loki
      - -n
      - argocd
      - -o
      - "jsonpath={range .spec.sources[*]}{.repoURL}{' | '}{.chart}{' | '}{.targetRevision}{'\\n'}{end}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: loki_application_sources
  changed_when: false
  failed_when: >
    loki_application_sources.rc != 0 or
    'https://grafana-community.github.io/helm-charts | loki | 13.6.1' not in loki_application_sources.stdout or
    'https://grafana.github.io/helm-charts | promtail | 6.17.1' not in loki_application_sources.stdout or
    gitops_revision not in loki_application_sources.stdout
  when: monitoring_enabled | default(true) | bool

- name: Verify Leantime app log sidecar is reconciled
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - deployment
      - leantime
      - -n
      - default
      - -o
      - "jsonpath={range .spec.template.spec.containers[*]}container={.name}{'\\n'}{end}{range .spec.template.spec.initContainers[*]}initContainer={.name}{'\\n'}{end}{range .spec.template.spec.volumes[*]}volume={.name}{'\\n'}{end}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: leantime_log_sidecar
  changed_when: false
  failed_when: >
    leantime_log_sidecar.rc != 0 or
    'container=leantime-app-log-tail' not in leantime_log_sidecar.stdout or
    'initContainer=prepare-leantime-log-dir' not in leantime_log_sidecar.stdout or
    'volume=leantime-app-logs' not in leantime_log_sidecar.stdout
  when: monitoring_enabled | default(true) | bool

- name: Verify Leantime logs dashboard is reconciled
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - configmap
      - leantime-logs-dashboard
      - -n
      - monitoring
      - -o
      - "jsonpath={.metadata.labels.grafana_dashboard}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: leantime_logs_dashboard
  changed_when: false
  failed_when: leantime_logs_dashboard.rc != 0 or leantime_logs_dashboard.stdout | default('') | trim != '1'
  when: monitoring_enabled | default(true) | bool

- name: Verify Leantime logs dashboard queries app log sidecar
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - configmap
      - leantime-logs-dashboard
      - -n
      - monitoring
      - -o
      - yaml
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: leantime_logs_dashboard_body
  changed_when: false
  failed_when: leantime_logs_dashboard_body.rc != 0 or not (leantime_logs_dashboard_body.stdout is search('leantime-app-log-tail'))
  when: monitoring_enabled | default(true) | bool

- name: Verify Baserow logs dashboard is reconciled
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - configmap
      - baserow-logs-dashboard
      - -n
      - monitoring
      - -o
      - "jsonpath={.metadata.labels.grafana_dashboard}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: baserow_logs_dashboard
  changed_when: false
  failed_when: baserow_logs_dashboard.rc != 0 or baserow_logs_dashboard.stdout | default('') | trim != '1'
  when: monitoring_enabled | default(true) | bool

- name: Read platform probe validation timestamp
  ansible.builtin.command:
    argv:
      - date
      - +%s
  register: platform_probe_validation_timestamp
  changed_when: false

- name: Set platform probe validation pod names
  ansible.builtin.set_fact:
    loki_volume_validation_pod_name: "loki-volume-validation-{{ platform_probe_validation_timestamp.stdout }}"
    wisemapping_api_validation_pod_name: "wisemapping-api-validation-{{ platform_probe_validation_timestamp.stdout }}"
    baserow_web_validation_pod_name: "baserow-web-validation-{{ platform_probe_validation_timestamp.stdout }}"
    loki_volume_validation_start_ns: "{{ ((platform_probe_validation_timestamp.stdout | int) - 900) ~ '000000000' }}"
    loki_volume_validation_end_ns: "{{ (platform_probe_validation_timestamp.stdout | int) ~ '000000000' }}"

- name: Verify Loki volume API for Grafana Logs Drilldown
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - run
      - "{{ loki_volume_validation_pod_name }}"
      - -n
      - monitoring
      - --rm=true
      - --attach=true
      - -i
      - --restart=Never
      - --image=curlimages/curl:8.8.0
      - --quiet=true
      - --
      - curl
      - -fsS
      - --max-time
      - "15"
      - "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/index/volume?query=%7Bnamespace%3D~%22.%2B%22%7D&start={{ loki_volume_validation_start_ns }}&end={{ loki_volume_validation_end_ns }}&limit=10"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: loki_volume_api
  changed_when: false
  failed_when: loki_volume_api.rc != 0 or not (loki_volume_api.stdout is search('"status":"success"'))
  when: monitoring_enabled | default(true) | bool

- name: Verify WiseMapping backend API is reachable
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - run
      - "{{ wisemapping_api_validation_pod_name }}"
      - -n
      - wisemapping
      - --rm=true
      - --attach=true
      - -i
      - --restart=Never
      - --image=curlimages/curl:8.8.0
      - --quiet=true
      - --
      - curl
      - -fsS
      - --max-time
      - "15"
      - -H
      - "Host: mindmaps.thekeepstudios.com"
      - -H
      - "X-Forwarded-Proto: https"
      - "http://wisemapping/api/restful/app/config"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: wisemapping_backend_api
  changed_when: false
  failed_when: wisemapping_backend_api.rc != 0

- name: Verify Baserow web service is reachable
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - run
      - "{{ baserow_web_validation_pod_name }}"
      - -n
      - baserow
      - --rm=true
      - --attach=true
      - -i
      - --restart=Never
      - --image=curlimages/curl:8.8.0
      - --quiet=true
      - --
      - sh
      - -ceu
      - |
        curl -fsS --max-time 20 \
          -H "Host: relationships.thekeepstudios.com" \
          -H "X-Forwarded-Proto: https" \
          http://baserow/ > /tmp/baserow.html
        grep -Eiq "baserow|login|sign" /tmp/baserow.html
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: baserow_web
  changed_when: false
  failed_when: baserow_web.rc != 0

- name: Check Twenty backup CronJob
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - cronjob
      - twenty-backup
      - -n
      - twenty
      - -o
      - name
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: twenty_backup_cron
  changed_when: false
  failed_when: twenty_backup_cron.rc != 0 or twenty_backup_cron.stdout | default('') | trim != 'cronjob.batch/twenty-backup'
  when: platform_validation_twenty_enabled | bool

- name: Check EspoCRM backup CronJob
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - cronjob
      - espocrm-backup
      - -n
      - espocrm
      - -o
      - name
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: espocrm_backup_cron
  changed_when: false
  failed_when: espocrm_backup_cron.rc != 0 or espocrm_backup_cron.stdout | default('') | trim != 'cronjob.batch/espocrm-backup'
  when: platform_validation_espocrm_enabled | bool

- name: Verify Twenty optional CRM service is reachable
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - run
      - "twenty-web-validation-{{ platform_probe_validation_timestamp.stdout }}"
      - -n
      - twenty
      - --rm=true
      - --attach=true
      - -i
      - --restart=Never
      - --image=curlimages/curl:8.8.0
      - --quiet=true
      - --
      - sh
      - -ceu
      - |
        curl -fsS --max-time 20 http://twenty/healthz >/tmp/twenty-health.txt
        curl -fsS --max-time 20 \
          -H "Host: twenty.thekeepstudios.com" \
          -H "X-Forwarded-Proto: https" \
          http://twenty/ > /tmp/twenty.html
        grep -Eiq "twenty|login|sign|workspace" /tmp/twenty.html
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: twenty_web
  changed_when: false
  failed_when: twenty_web.rc != 0
  when: platform_validation_twenty_enabled | bool

- name: Verify EspoCRM optional CRM service is reachable
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - run
      - "espocrm-web-validation-{{ platform_probe_validation_timestamp.stdout }}"
      - -n
      - espocrm
      - --rm=true
      - --attach=true
      - -i
      - --restart=Never
      - --image=curlimages/curl:8.8.0
      - --quiet=true
      - --
      - sh
      - -ceu
      - |
        curl -fsS --max-time 20 \
          -H "Host: espocrm.thekeepstudios.com" \
          -H "X-Forwarded-Proto: https" \
          http://espocrm/ > /tmp/espocrm.html
        grep -Eiq "espocrm|login|username|password" /tmp/espocrm.html
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: espocrm_web
  changed_when: false
  failed_when: espocrm_web.rc != 0
  when: platform_validation_espocrm_enabled | bool

- name: Read Leantime backup validation timestamp
  ansible.builtin.command:
    argv:
      - date
      - +%s
  register: leantime_backup_validation_timestamp
  changed_when: false

- name: Set Leantime backup validation names
  ansible.builtin.set_fact:
    leantime_backup_validation_min_epoch: "{{ leantime_backup_validation_timestamp.stdout }}"
    leantime_backup_validation_job_name: "leantime-db-backup-validation-{{ leantime_backup_validation_timestamp.stdout }}"
    leantime_backup_validator_pod_name: "leantime-backup-artifact-validation-{{ leantime_backup_validation_timestamp.stdout }}"

- name: Trigger one-time Leantime backup Job
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - create
      - job
      - "{{ leantime_backup_validation_job_name }}"
      - --from=cronjob/leantime-db-backup
      - -n
      - default
  environment: "{{ platform_kubectl_env }}"
  become: true
  become_user: k3s-admin
  register: leantime_backup_validation_job
  changed_when: true

- name: Wait for one-time Leantime backup Job to complete
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - wait
      - --for=condition=complete
      - --timeout=300s
      - "job/{{ leantime_backup_validation_job_name }}"
      - -n
      - default
  environment: "{{ platform_kubectl_env }}"
  become: true
  become_user: k3s-admin
  changed_when: false

- name: Create Leantime backup artifact validator pod
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - apply
      - -f
      - "-"
  args:
    stdin: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: {{ leantime_backup_validator_pod_name }}
        namespace: default
      spec:
        restartPolicy: Never
        containers:
          - name: validator
            image: mariadb:11.8.6-ubi9
            imagePullPolicy: IfNotPresent
            command:
              - sh
              - -ceu
              - |
                latest="$(ls -t /backup/leantime_*.sql.gz 2>/dev/null | head -n 1)"
                test -n "${latest}"
                test -s "${latest}"
                file_epoch="$(stat -c %Y "${latest}")"
                test "${file_epoch}" -ge "{{ leantime_backup_validation_min_epoch }}"
                gzip -t "${latest}"
                echo "validated ${latest}"
            volumeMounts:
              - name: backup-data
                mountPath: /backup
        volumes:
          - name: backup-data
            persistentVolumeClaim:
              claimName: leantime-backup-pvc
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"

- name: Wait for Leantime backup artifact validator pod
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - get
      - pod
      - "{{ leantime_backup_validator_pod_name }}"
      - -n
      - default
      - -o
      - "jsonpath={.status.phase}"
  become: true
  become_user: k3s-admin
  environment: "{{ platform_kubectl_env }}"
  register: leantime_backup_validator_pod
  until: leantime_backup_validator_pod.stdout | default('') | trim in ['Succeeded', 'Failed']
  retries: 60
  delay: 5
  changed_when: false
  failed_when: false

- name: Read Leantime backup artifact validation log
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - logs
      - "pod/{{ leantime_backup_validator_pod_name }}"
      - -n
      - default
  environment: "{{ platform_kubectl_env }}"
  become: true
  become_user: k3s-admin
  register: leantime_backup_validator_log
  changed_when: false
  failed_when: false

- name: Fail if Leantime backup artifact validation failed
  ansible.builtin.fail:
    msg: >-
      Leantime backup artifact validation failed
      (phase={{ leantime_backup_validator_pod.stdout | default('') | trim | default('unknown', true) }}):
      {{ leantime_backup_validator_log.stdout | default(leantime_backup_validator_log.stderr) }}
  when: leantime_backup_validator_pod.rc != 0 or leantime_backup_validator_pod.stdout | default('') | trim != 'Succeeded'

- name: Report Leantime backup artifact validation evidence
  ansible.builtin.debug:
    msg: "{{ leantime_backup_validator_log.stdout }}"

- name: Remove Leantime backup artifact validator pod
  ansible.builtin.command:
    argv:
      - "{{ platform_kubectl }}"
      - delete
      - pod
      - "{{ leantime_backup_validator_pod_name }}"
      - -n
      - default
      - --ignore-not-found=true
  environment: "{{ platform_kubectl_env }}"
  become: true
  become_user: k3s-admin

- name: Verify HTTPS endpoints
  ansible.builtin.uri:
    url: "{{ item }}"
    status_code: [200, 401, 403]
    timeout: 15
  loop: "{{ ['https://auth.thekeepstudios.com', 'https://projects.thekeepstudios.com', 'https://mindmaps.thekeepstudios.com', 'https://relationships.thekeepstudios.com', 'https://grafana.thekeepstudios.com', 'https://prometheus.thekeepstudios.com', 'https://alerts.thekeepstudios.com', 'https://argocd.thekeepstudios.com'] + (['https://twenty.thekeepstudios.com'] if (platform_validation_twenty_enabled | bool) else []) + (['https://espocrm.thekeepstudios.com'] if (platform_validation_espocrm_enabled | bool) else []) }}"
  when: require_external_https | default(true) | bool

- name: Verify protected endpoints require authentication
  ansible.builtin.uri:
    url: "{{ item }}"
    status_code: [401, 403]
    timeout: 15
    follow_redirects: all
  loop:
    - https://prometheus.thekeepstudios.com
    - https://alerts.thekeepstudios.com
  when: require_external_https | default(true) | bool

- name: Ensure direct_http_urls is not empty when HTTPS is required
  ansible.builtin.fail:
    msg: "direct_http_urls must be provided when require_external_https is enabled."
  when:
    - require_external_https | default(true) | bool
    - direct_http_urls | default([]) | length == 0

- name: Probe direct HTTP origins
  ansible.builtin.command:
    argv:
      - curl
      - -sS
      - --max-time
      - "10"
      - -o
      - /dev/null
      - -w
      - "%{http_code}"
      - "{{ item }}"
  loop: "{{ direct_http_urls | default([]) | select('string') | map('trim') | reject('equalto', '') | list }}"
  register: direct_http_origin_probes
  changed_when: false
  failed_when: false
  when: require_external_https | default(true) | bool

- name: Fail if any direct HTTP origin exposes an application
  ansible.builtin.fail:
    msg: "Direct HTTP origin exposes an application: {{ item.item }} (HTTP {{ item.stdout | trim }})."
  loop: "{{ direct_http_origin_probes.results | default([]) }}"
  when:
    - require_external_https | default(true) | bool
    - (item.stdout | default('') | trim) not in ['', '000', '404']

- name: Report direct HTTP origin block evidence
  ansible.builtin.debug:
    msg: "Direct HTTP origin blocked: {{ item.item }} (curl_rc={{ item.rc }}, http_code={{ item.stdout | default('000') | trim }})."
  loop: "{{ direct_http_origin_probes.results | default([]) }}"
  when: require_external_https | default(true) | bool
