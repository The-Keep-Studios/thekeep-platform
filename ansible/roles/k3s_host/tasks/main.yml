- name: Create k3s group
  ansible.builtin.group:
    name: k3s
    state: present

- name: Create k3s-admin user
  ansible.builtin.user:
    name: k3s-admin
    group: k3s
    shell: /bin/bash
    system: true
    create_home: true

- name: Ensure curl is installed
  ansible.builtin.apt:
    name: curl
    state: present
    update_cache: true

- name: Check for existing k3s install
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: "0755"
  when: not k3s_bin.stat.exists

- name: Install k3s with isolated permissions
  ansible.builtin.command: sh /tmp/k3s-install.sh
  environment:
    K3S_KUBECONFIG_MODE: "640"
    K3S_KUBECONFIG_GROUP: "k3s"
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_bin.stat.exists

- name: Enable and start k3s
  ansible.builtin.service:
    name: k3s
    enabled: true
    state: started

- name: Create .kube directory for k3s-admin
  ansible.builtin.file:
    path: /home/k3s-admin/.kube
    state: directory
    owner: k3s-admin
    group: k3s
    mode: "0700"

- name: Copy kubeconfig to k3s-admin home
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/k3s-admin/.kube/config
    remote_src: true
    owner: k3s-admin
    group: k3s
    mode: "0600"

- name: Allow k3s-admin to run kubectl without sudo password
  ansible.builtin.copy:
    content: "k3s-admin ALL=(ALL) NOPASSWD: /usr/local/bin/kubectl"
    dest: /etc/sudoers.d/k3s-admin
    mode: "0440"

- name: Wait for k3s API to be ready
  ansible.builtin.command: /usr/local/bin/kubectl get nodes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: kubectl_nodes
  retries: 20
  delay: 6
  until: kubectl_nodes.rc == 0
  changed_when: false
