# User-configurable variables
# Place the Blackmagic installer .run file here (license requires you download it yourself):
#   ./files/DaVinci_Resolve_Studio_20.3.2_Linux.run
#
# Then run:
#   ./bootstrap.sh
#   ansible-playbook -K site.yml

resolve_installer_run: "{{ playbook_dir }}/files/DaVinci_Resolve_Studio_20.3.2_Linux.run"

# macOS Resolve Studio installer (DMG in ./files)
resolve_macos_app_path: "/Applications/DaVinci Resolve Studio.app"
resolve_macos_dmg_path: ""
resolve_macos_dmg_pattern: "DaVinci_Resolve_Studio*.dmg"
resolve_macos_pkg_pattern: "DaVinci Resolve Studio*.pkg"
resolve_macos_mountpoint: "/Volumes/ResolveStudio"

# MakeResolveDeb (turns the .run into a proper .deb for Ubuntu/Mint)
makeresolvedeb_version: "1.8.3"
makeresolvedeb_url: "https://www.danieltufvesson.com/download/?file=makeresolvedeb%2Fmakeresolvedeb_{{ makeresolvedeb_version }}_multi.sh.tar.gz"

# Ubuntu pool libssl1.1 (Mint 22 / Ubuntu 24.04 often needs this for Resolve)
libssl11_url: "https://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2.24_amd64.deb"

# Optional: Resolve 20 "Extras download" CA bundle path symlink fix
resolve_extras_ca_symlink: true

# k3s workload toggles
enable_k3s: true
enable_localai: true
enable_wisemapping: true
k3s_version: "v1.35.3+k3s1"

# GitOps Configuration
gitops_repo_url: "https://github.com/The-Keep-Studios/thekeep-platform.git"
gitops_revision: "main"
gitops_repo_private: false
# If gitops_repo_private is true, provide credentials in ansible/production_vars.yml:
#   gitops_repo_ssh_private_key: "...", or
#   gitops_repo_ssh_private_key_path: "/path/to/key", or
#   gitops_repo_username/gitops_repo_password.

# Load platform_secrets from production_vars.yml or Ansible Vault
# platform_secrets: (Moved to production_vars.yml.example)

platform_oidc:
  leantime:
    enable: false
  wisemapping:
    enable: false

platform_email:
  leantime:
    use_smtp: false

platform_validation_argo_app_status_retries: 60
platform_validation_argo_app_status_delay: 10
platform_validation_argo_app_allowed_statuses:
  platform-root:
    # Root can inherit OutOfSync from a child Application with an accepted
    # non-blocking drift state. Child apps are validated independently below.
    - OutOfSync Healthy
  platform-leantime:
    # Leantime can remain app-level Progressing while the Deployment is
    # available. Later validation checks the workload, backup, and HTTPS path.
    - Synced Progressing
  platform-monitoring-loki:
    # Argo CD currently reports the Loki StatefulSet OutOfSync while
    # `argocd app diff --core` returns no diff and the workload is healthy.
    - OutOfSync Healthy

monitoring_enabled: true
require_external_https: true
direct_http_urls: []

# Workload config is now manifest-first:
#   kubernetes/apps/localai/standalone.yaml
#   kubernetes/apps/wisemapping/standalone.yaml
#   kubernetes/apps/leantime/demo-standalone.yaml
